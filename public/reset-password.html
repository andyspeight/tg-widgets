<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password · Travelgenix</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/editor-shell.css">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<main class="auth-shell" role="main">
  <div class="auth-brand">Travelgenix</div>
  <div class="auth-card">
    <h1 id="heading">Set a new password</h1>
    <p class="lede" id="lede">Choose a strong password — at least 10 characters.</p>

    <div id="msg" class="auth-msg" role="status" aria-live="polite"></div>

    <form id="resetForm" class="auth-form" novalidate>
      <div class="field">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" required minlength="10">
        <span class="hint">At least 10 characters. Use a passphrase you'll remember.</span>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" required minlength="10">
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Set new password</button>
    </form>

    <p class="magic-toggle" style="margin-top:18px;">
      <a href="/signin" class="link-btn">Back to sign in</a>
    </p>
  </div>
  <p class="auth-foot">Travelgenix · Bournemouth, UK · part of Agendas Group</p>
</main>

<script>
(function () {
  'use strict';
  const form = document.getElementById('resetForm');
  const pw1 = document.getElementById('newPassword');
  const pw2 = document.getElementById('confirmPassword');
  const submitBtn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');
  const heading = document.getElementById('heading');
  const lede = document.getElementById('lede');

  const params = new URLSearchParams(location.search);
  const token = params.get('token');
  const isMigration = params.get('migration') === '1';
  const isForced = params.get('forced') === '1';

  if (isMigration) {
    heading.textContent = "Welcome back — let's set your new password";
    lede.textContent = "We've upgraded our security. Please choose a new password to continue.";
  } else if (isForced) {
    heading.textContent = 'Set a new password';
    lede.textContent = 'Your account requires a new password before you can continue.';
  }

  function showMsg(text, kind) { msg.textContent = text; msg.className = 'auth-msg ' + (kind || 'info'); }

  // Forced-reset path: user is already signed in, no token needed.
  // We use a special endpoint? No — for simplicity we just redirect them to
  // do forgot-password, since they're already verified by virtue of
  // having reset their password during migration. But for now we keep it
  // simple: forced-reset users come here via a token issued by the migration
  // email, not by being signed in. So we always require a token.
  if (!token) {
    showMsg('This reset link is missing or invalid. Please request a new one from the forgot password page.', 'error');
    submitBtn.disabled = true;
    return;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const a = pw1.value;
    const b = pw2.value;

    if (a.length < 10) { showMsg('Password must be at least 10 characters.', 'error'); return; }
    if (a !== b)       { showMsg("Passwords don't match.", 'error'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving…';
    try {
      const res = await fetch('/api/auth/password/reset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: a })
      });
      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data.ok) {
        const code = data.code || 'error';
        const friendly = code === 'expired_token'
          ? 'This reset link has expired. Please request a new one.'
          : code === 'invalid_token'
          ? 'This reset link is invalid or has already been used.'
          : code === 'invalid_password'
          ? data.error || 'Password is not strong enough.'
          : code === 'rate_limit'
          ? 'Too many attempts. Please wait and try again.'
          : 'Something went wrong. Please try again.';
        showMsg(friendly, 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Set new password';
        return;
      }

      // Clear any stale session — they'll need to sign in fresh
      try {
        localStorage.removeItem('tg_token');
        localStorage.removeItem('tg_user');
        localStorage.removeItem('tg_client');
      } catch {}

      showMsg('Password updated. Redirecting you to sign in…', 'success');
      submitBtn.textContent = 'Done';
      setTimeout(() => { location.href = '/signin'; }, 1200);
    } catch {
      showMsg('Network error. Please try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Set new password';
    }
  });
})();
</script>
</body>
</html>
