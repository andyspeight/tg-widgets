<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Travelgenix Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tg-primary: #1B2B5B;
      --tg-primary-light: #2A3F7A;
      --tg-primary-dark: #111D3E;
      --tg-accent: #00B4D8;
      --tg-accent-light: #48CAE4;
      --tg-accent-dark: #0096B7;
      --tg-success: #10B981;
      --tg-warning: #F59E0B;
      --tg-error: #EF4444;
      --tg-info: #3B82F6;
      --tg-bg-primary: #FFFFFF;
      --tg-bg-secondary: #F8FAFC;
      --tg-bg-tertiary: #F1F5F9;
      --tg-border: #E2E8F0;
      --tg-border-light: #F1F5F9;
      --tg-text-primary: #0F172A;
      --tg-text-secondary: #475569;
      --tg-text-tertiary: #94A3B8;
      --tg-text-inverse: #FFFFFF;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --space-12: 48px; --space-16: 64px;
      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.10);
    }
    [data-theme="dark"] {
      --tg-bg-primary: #0F172A;
      --tg-bg-secondary: #1E293B;
      --tg-bg-tertiary: #334155;
      --tg-border: #334155;
      --tg-border-light: #1E293B;
      --tg-text-primary: #F8FAFC;
      --tg-text-secondary: #CBD5E1;
      --tg-text-tertiary: #64748B;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--tg-text-primary);
      background: var(--tg-bg-secondary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--tg-bg-primary);
      border-bottom: 1px solid var(--tg-border);
      padding: 0 var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: var(--space-4); }
    .logo {
      display: flex; align-items: center; gap: var(--space-2);
      font-weight: 700; font-size: 18px; color: var(--tg-primary);
    }
    [data-theme="dark"] .logo { color: var(--tg-accent-light); }
    .logo-mark {
      width: 28px; height: 28px; border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--tg-primary), var(--tg-accent));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }
    .topbar-right { display: flex; align-items: center; gap: var(--space-4); }
    .user-chip {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: var(--tg-bg-tertiary);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--tg-text-secondary);
    }
    .user-chip .role-badge {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      padding: 2px 8px; border-radius: 4px;
      background: var(--tg-accent); color: white;
      letter-spacing: 0.4px;
    }
    .theme-toggle {
      width: 36px; height: 36px; border-radius: var(--radius-md);
      border: 1px solid var(--tg-border);
      background: var(--tg-bg-primary);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--tg-text-secondary);
      transition: all 150ms ease;
    }
    .theme-toggle:hover { background: var(--tg-bg-tertiary); color: var(--tg-text-primary); }

    .tabs {
      background: var(--tg-bg-primary);
      border-bottom: 1px solid var(--tg-border);
      padding: 0 var(--space-6);
      display: flex;
      gap: var(--space-1);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: var(--space-4) var(--space-4);
      font-size: 14px; font-weight: 500;
      color: var(--tg-text-secondary);
      cursor: pointer;
      border: none; background: transparent;
      border-bottom: 2px solid transparent;
      transition: all 150ms ease;
      white-space: nowrap;
      font-family: inherit;
      margin-bottom: -1px;
    }
    .tab:hover:not([disabled]) { color: var(--tg-text-primary); }
    .tab[aria-selected="true"] {
      color: var(--tg-primary);
      border-bottom-color: var(--tg-accent);
      font-weight: 600;
    }
    [data-theme="dark"] .tab[aria-selected="true"] { color: var(--tg-text-primary); }
    .tab[disabled] {
      color: var(--tg-text-tertiary);
      cursor: not-allowed;
      opacity: 0.6;
    }
    .tab-badge {
      font-size: 11px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px;
      background: var(--tg-bg-tertiary); color: var(--tg-text-secondary);
      margin-left: var(--space-2);
    }

    main {
      flex: 1;
      min-height: 0;
      position: relative;
      background: var(--tg-bg-secondary);
    }

    .state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12);
      text-align: center;
      color: var(--tg-text-secondary);
      background: var(--tg-bg-secondary);
    }
    .state[hidden] { display: none !important; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--tg-border);
      border-top-color: var(--tg-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: var(--space-4);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; border-top-color: var(--tg-accent); }
    }
    .state h2 {
      font-size: 18px; font-weight: 600; color: var(--tg-text-primary);
      margin: 0 0 var(--space-2);
    }
    .state p { margin: 0 0 var(--space-4); font-size: 14px; max-width: 400px; }

    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      font-family: inherit; font-size: 14px; font-weight: 600;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 150ms ease;
      min-height: 44px;
      text-decoration: none;
    }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2);
    }
    .btn-primary { background: var(--tg-primary); color: white; }
    .btn-primary:hover { background: var(--tg-primary-light); }
    .btn-primary:active { background: var(--tg-primary-dark); }
    .btn-secondary {
      background: var(--tg-bg-primary);
      color: var(--tg-text-primary);
      border-color: var(--tg-border);
    }
    .btn-secondary:hover { background: var(--tg-bg-tertiary); }

    .tab-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--tg-bg-secondary);
      display: block;
    }
    .tab-frame[hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">
          <div class="logo-mark">TG</div>
          <span>Control</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user-chip" id="user-chip" hidden>
          <span id="user-email"></span>
          <span class="role-badge" id="user-role"></span>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" type="button">
          <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
          </svg>
          <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tabs" role="tablist" aria-label="Travelgenix Control sections" id="tabs" hidden>
      <button class="tab" role="tab" data-tab="clients" aria-selected="true" type="button">
        Clients
      </button>
      <button class="tab" role="tab" data-tab="new-client" aria-selected="false" type="button">
        New Client
      </button>
      <button class="tab" role="tab" data-tab="packages" aria-selected="false" type="button">
        Packages
      </button>
      <button class="tab" role="tab" data-tab="catalogue" aria-selected="false" type="button">
        Catalogue
      </button>
      <button class="tab" role="tab" data-tab="staff" disabled aria-selected="false" type="button">
        Staff <span class="tab-badge">soon</span>
      </button>
    </nav>

    <main>
      <div class="state" id="loading-state">
        <div class="spinner" role="status" aria-label="Loading"></div>
        <h2>Loading Control</h2>
        <p>Checking your access&hellip;</p>
      </div>

      <div class="state" id="signin-state" hidden>
        <h2>Sign in required</h2>
        <p>You need to sign in to your Travelgenix account to access Control.</p>
        <a class="btn btn-primary" href="/signin.html?redirect=/admin/" id="signin-btn">Sign in</a>
      </div>

      <div class="state" id="forbidden-state" hidden>
        <h2>Admin access only</h2>
        <p>This area is for Travelgenix staff. If you think you should have access, contact Andy.</p>
        <a class="btn btn-secondary" href="/" id="home-btn">Back to Travelgenix</a>
      </div>

      <iframe id="tab-frame" class="tab-frame" title="Control content" hidden></iframe>
    </main>
  </div>

  <script>
    async function checkAuth() {
      try {
        const r = await fetch('/api/auth/me', { credentials: 'include' });
        if (r.status === 401) {
          showState('signin');
          return null;
        }
        if (!r.ok) throw new Error('me endpoint failed: ' + r.status);
        const data = await r.json();
        const perms = data?.permissions || [];
        const adminPerm = perms.find(p =>
          p.product === 'widget_suite' && (p.role === 'owner' || p.role === 'admin')
        );
        if (!adminPerm) {
          showState('forbidden');
          return null;
        }
        return { user: data.user, role: adminPerm.role };
      } catch (err) {
        console.error('[control] auth check failed', err);
        showState('signin');
        return null;
      }
    }

    function showState(name) {
      document.getElementById('loading-state').hidden = name !== 'loading';
      document.getElementById('signin-state').hidden = name !== 'signin';
      document.getElementById('forbidden-state').hidden = name !== 'forbidden';
      document.getElementById('tab-frame').hidden = name !== 'app';
      document.getElementById('tabs').hidden = name !== 'app';
    }

    const TAB_URLS = {
      clients: '/admin/clients.html',
      'new-client': '/admin/new-client.html',
      packages: '/admin/packages.html',
      catalogue: '/admin/catalogue.html',
    };

    function openTab(name) {
      const url = TAB_URLS[name];
      if (!url) return;
      const frame = document.getElementById('tab-frame');
      frame.src = url;
      document.querySelectorAll('.tab').forEach(t => {
        t.setAttribute('aria-selected', String(t.dataset.tab === name));
      });
      history.replaceState(null, '', '#' + name);
    }

    function bindTabs() {
      document.querySelectorAll('.tab').forEach(t => {
        if (t.disabled) return;
        t.addEventListener('click', () => openTab(t.dataset.tab));
      });
    }

    // Listen for messages from child iframes (e.g. clicking "New client"
    // inside the clients list tells us to switch tabs)
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'switch-tab' && TAB_URLS[e.data.tab]) {
        openTab(e.data.tab);
      }
    });

    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('icon-sun').hidden = t === 'dark';
      document.getElementById('icon-moon').hidden = t !== 'dark';
      localStorage.setItem('tg-theme', t);
      const frame = document.getElementById('tab-frame');
      if (frame.contentWindow) {
        try { frame.contentWindow.postMessage({ type: 'theme', value: t }, '*'); } catch {}
      }
    }
    function bindTheme() {
      const saved = localStorage.getItem('tg-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(saved);
      document.getElementById('theme-toggle').addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    }

    (async function init() {
      bindTheme();
      const auth = await checkAuth();
      if (!auth) return;
      document.getElementById('user-email').textContent = auth.user.email || '';
      document.getElementById('user-role').textContent = auth.role;
      document.getElementById('user-chip').hidden = false;
      bindTabs();
      showState('app');
      const initial = (location.hash || '').replace('#', '') || 'clients';
      openTab(TAB_URLS[initial] ? initial : 'clients');
    })();
  </script>
</body>
</html>
