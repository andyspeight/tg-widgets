<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clients · Travelgenix Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tg-primary: #1B2B5B; --tg-primary-light: #2A3F7A; --tg-primary-dark: #111D3E;
      --tg-accent: #00B4D8; --tg-accent-light: #48CAE4; --tg-accent-dark: #0096B7;
      --tg-success: #10B981; --tg-warning: #F59E0B; --tg-error: #EF4444; --tg-info: #3B82F6;
      --tg-bg-primary: #FFFFFF; --tg-bg-secondary: #F8FAFC; --tg-bg-tertiary: #F1F5F9;
      --tg-border: #E2E8F0; --tg-border-light: #F1F5F9;
      --tg-text-primary: #0F172A; --tg-text-secondary: #475569; --tg-text-tertiary: #94A3B8;
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-12: 48px;
      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px; --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.10);
    }
    [data-theme="dark"] {
      --tg-bg-primary: #0F172A; --tg-bg-secondary: #1E293B; --tg-bg-tertiary: #334155;
      --tg-border: #334155; --tg-border-light: #1E293B;
      --tg-text-primary: #F8FAFC; --tg-text-secondary: #CBD5E1; --tg-text-tertiary: #64748B;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px; line-height: 1.6;
      color: var(--tg-text-primary);
      background: var(--tg-bg-secondary);
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 var(--space-6) var(--space-12); }

    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: var(--space-4);
      margin-bottom: var(--space-6);
      padding-top: var(--space-6);
    }
    .page-header h1 { font-size: 28px; font-weight: 700; margin: 0 0 var(--space-1); letter-spacing: -0.02em; }
    .page-header p { margin: 0; color: var(--tg-text-secondary); font-size: 14px; max-width: 620px; }

    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      font-family: inherit; font-size: 14px; font-weight: 600;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      cursor: pointer; transition: all 150ms ease;
      min-height: 44px;
      text-decoration: none;
    }
    .btn:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2); }
    .btn-primary { background: var(--tg-primary); color: white; }
    .btn-primary:hover { background: var(--tg-primary-light); }

    .filter-bar {
      background: var(--tg-bg-primary);
      border: 1px solid var(--tg-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
      margin-bottom: var(--space-4);
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: var(--space-3);
      align-items: center;
    }
    @media (max-width: 800px) {
      .filter-bar { grid-template-columns: 1fr; }
    }

    .search-input {
      position: relative;
    }
    .search-input input {
      font-family: inherit; font-size: 15px;
      padding: var(--space-3) var(--space-3) var(--space-3) 40px;
      border-radius: var(--radius-md);
      border: 1px solid var(--tg-border);
      background: var(--tg-bg-primary);
      color: var(--tg-text-primary);
      width: 100%;
      min-height: 44px;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .search-input input:focus {
      outline: none;
      border-color: var(--tg-accent);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.15);
    }
    .search-input svg {
      position: absolute;
      left: var(--space-3);
      top: 50%; transform: translateY(-50%);
      color: var(--tg-text-tertiary);
      pointer-events: none;
    }

    select {
      font-family: inherit; font-size: 14px;
      padding: var(--space-3);
      padding-right: 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--tg-border);
      background: var(--tg-bg-primary);
      color: var(--tg-text-primary);
      min-height: 44px;
      cursor: pointer;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394A3B8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 16px;
      appearance: none;
    }
    select:focus {
      outline: none;
      border-color: var(--tg-accent);
      box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.15);
    }

    .table-wrap {
      background: var(--tg-bg-primary);
      border: 1px solid var(--tg-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: var(--space-3) var(--space-4);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--tg-text-tertiary);
      background: var(--tg-bg-secondary);
      border-bottom: 1px solid var(--tg-border);
      white-space: nowrap;
    }
    td {
      padding: var(--space-4);
      border-bottom: 1px solid var(--tg-border-light);
      vertical-align: middle;
      font-size: 14px;
    }
    tbody tr {
      cursor: pointer;
      transition: background 100ms ease;
    }
    tbody tr:hover { background: var(--tg-bg-secondary); }
    tbody tr:last-child td { border-bottom: none; }

    .col-name { min-width: 240px; }
    .col-name .name { font-weight: 600; color: var(--tg-text-primary); }
    .col-name .trading {
      font-size: 12px; color: var(--tg-text-tertiary);
      margin-top: 2px;
    }

    .col-contact .email {
      font-size: 13px;
      color: var(--tg-text-secondary);
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
    }
    .col-contact .person {
      font-size: 13px;
      color: var(--tg-text-secondary);
      margin-top: 2px;
    }

    .pkg-pill {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 4px;
      background: var(--tg-bg-tertiary);
      color: var(--tg-text-secondary);
    }
    .pkg-pill[data-pkg="Spark"] { background: rgba(245, 158, 11, 0.12); color: var(--tg-warning); }
    .pkg-pill[data-pkg="Boost"] { background: rgba(0, 180, 216, 0.12); color: var(--tg-accent-dark); }
    .pkg-pill[data-pkg="Ignite"] { background: rgba(239, 68, 68, 0.12); color: var(--tg-error); }
    .pkg-pill[data-pkg="Bespoke"] { background: rgba(27, 43, 91, 0.12); color: var(--tg-primary); }

    [data-theme="dark"] .pkg-pill[data-pkg="Boost"] { color: var(--tg-accent-light); }
    [data-theme="dark"] .pkg-pill[data-pkg="Bespoke"] { color: var(--tg-text-primary); background: rgba(0, 180, 216, 0.12); }

    .status-pill {
      display: inline-flex; align-items: center; gap: var(--space-1);
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .status-pill::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      display: inline-block;
    }
    .status-active { background: rgba(16, 185, 129, 0.12); color: var(--tg-success); }
    .status-active::before { background: var(--tg-success); }
    .status-trial { background: rgba(59, 130, 246, 0.12); color: var(--tg-info); }
    .status-trial::before { background: var(--tg-info); }
    .status-suspended, .status-paused { background: rgba(245, 158, 11, 0.12); color: var(--tg-warning); }
    .status-suspended::before, .status-paused::before { background: var(--tg-warning); }
    .status-cancelled, .status-archived { background: var(--tg-bg-tertiary); color: var(--tg-text-tertiary); }
    .status-cancelled::before, .status-archived::before { background: var(--tg-text-tertiary); }

    .mrr {
      font-weight: 600;
      color: var(--tg-text-primary);
      font-variant-numeric: tabular-nums;
    }
    .mrr .currency { color: var(--tg-text-tertiary); font-weight: 400; margin-right: 2px; }
    .mrr .empty { color: var(--tg-text-tertiary); font-weight: 400; }

    .col-counts {
      font-size: 12px;
      color: var(--tg-text-secondary);
      white-space: nowrap;
    }
    .col-counts .num { font-weight: 600; color: var(--tg-text-primary); }

    .center-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: var(--space-12) var(--space-6);
      text-align: center; color: var(--tg-text-secondary);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--tg-border); border-top-color: var(--tg-accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: var(--space-3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }

    .empty-state {
      padding: var(--space-12);
      text-align: center;
    }
    .empty-state h3 {
      font-size: 18px; font-weight: 600;
      color: var(--tg-text-primary);
      margin: 0 0 var(--space-2);
    }
    .empty-state p {
      color: var(--tg-text-secondary);
      max-width: 400px;
      margin: 0 auto var(--space-5);
    }

    .summary-stats {
      display: flex; gap: var(--space-2);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }
    .stat-chip {
      font-size: 13px;
      color: var(--tg-text-secondary);
      padding: var(--space-1) var(--space-3);
      background: var(--tg-bg-tertiary);
      border-radius: 4px;
    }
    .stat-chip strong { color: var(--tg-text-primary); font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div>
        <h1>Clients</h1>
        <p>Every client on the platform. Click any row to view, edit, or manage their package and entitlements.</p>
      </div>
      <button class="btn btn-primary" type="button" id="new-client-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        New client
      </button>
    </header>

    <div class="summary-stats" id="summary-stats" hidden></div>

    <div class="filter-bar">
      <div class="search-input">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="search-input" placeholder="Search by name, email or contact" autocomplete="off" />
      </div>
      <select id="filter-package">
        <option value="">All packages</option>
      </select>
      <select id="filter-status">
        <option value="">All statuses</option>
        <option value="Active">Active</option>
        <option value="Trial">Trial</option>
        <option value="Paused">Paused</option>
        <option value="Suspended">Suspended</option>
        <option value="Cancelled">Cancelled</option>
        <option value="Archived">Archived</option>
      </select>
    </div>

    <div id="content">
      <div class="center-state">
        <div class="spinner" role="status" aria-label="Loading clients"></div>
        <p>Loading clients&hellip;</p>
      </div>
    </div>
  </div>

  <script>
    // Inherit theme from parent
    window.addEventListener('message', (e) => {
      if (e.data?.type === 'theme') {
        document.documentElement.setAttribute('data-theme', e.data.value);
      }
    });
    try {
      const parentTheme = parent.document.documentElement.getAttribute('data-theme');
      if (parentTheme) document.documentElement.setAttribute('data-theme', parentTheme);
    } catch {}

    let allClients = [];
    let allPackages = [];
    let currentQuery = '';
    let currentPackage = '';
    let currentStatus = '';

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      })[c]);
    }
    function fmtMoney(n) {
      if (n == null) return '<span class="empty">—</span>';
      return '<span class="currency">£</span>' + Number(n).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch { return '—'; }
    }
    function statusClass(status) {
      const s = String(status).toLowerCase();
      if (['active'].includes(s)) return 'status-active';
      if (['trial'].includes(s)) return 'status-trial';
      if (['paused', 'suspended'].includes(s)) return 'status-' + s;
      if (['cancelled', 'archived'].includes(s)) return 'status-' + s;
      return 'status-cancelled';
    }

    async function loadClients() {
      const params = new URLSearchParams();
      if (currentQuery) params.set('q', currentQuery);
      if (currentPackage) params.set('package', currentPackage);
      if (currentStatus) params.set('status', currentStatus);

      try {
        const r = await fetch('/api/admin/clients/list?' + params, { credentials: 'include' });
        if (!r.ok) throw new Error('list failed: ' + r.status);
        const data = await r.json();
        allClients = data.clients || [];
        allPackages = data.packages || [];
        populatePackageFilter();
        renderSummary(data.total);
        renderTable();
      } catch (err) {
        console.error('[clients] load failed', err);
        document.getElementById('content').innerHTML = `
          <div class="empty-state">
            <h3>Could not load clients</h3>
            <p>Check your connection and try again. If the problem persists, contact support.</p>
          </div>`;
      }
    }

    function populatePackageFilter() {
      const sel = document.getElementById('filter-package');
      // Don't repopulate if already done
      if (sel.dataset.populated === 'true') return;
      const current = sel.value;
      sel.innerHTML = '<option value="">All packages</option>' +
        allPackages.map(p => `<option value="${escapeHtml(p.id)}">${escapeHtml(p.name)}</option>`).join('');
      if (current) sel.value = current;
      sel.dataset.populated = 'true';
    }

    function renderSummary(total) {
      const el = document.getElementById('summary-stats');
      if (allClients.length === 0 && total === 0) {
        el.hidden = true;
        return;
      }
      el.hidden = false;
      const totalMrr = allClients.reduce((sum, c) => sum + (c.mrr || 0), 0);
      const active = allClients.filter(c => c.status === 'Active').length;
      el.innerHTML = `
        <span class="stat-chip"><strong>${allClients.length}</strong> showing of ${total}</span>
        <span class="stat-chip"><strong>${active}</strong> active</span>
        <span class="stat-chip"><strong>£${Math.round(totalMrr).toLocaleString('en-GB')}</strong> MRR</span>
      `;
    }

    function renderTable() {
      const c = document.getElementById('content');

      if (allClients.length === 0) {
        const noResults = currentQuery || currentPackage || currentStatus;
        c.innerHTML = `
          <div class="table-wrap">
            <div class="empty-state">
              <h3>${noResults ? 'No matching clients' : 'No clients yet'}</h3>
              <p>${noResults
                ? 'Try clearing your filters to see everyone.'
                : 'Get started by onboarding your first client. The wizard walks you through company details, pricing, products and Luna Chat setup in five quick steps.'}</p>
              ${noResults ? '' : '<button class="btn btn-primary" type="button" id="empty-new-btn">Create first client</button>'}
            </div>
          </div>`;
        const emptyBtn = document.getElementById('empty-new-btn');
        if (emptyBtn) emptyBtn.addEventListener('click', goToNewClient);
        return;
      }

      const rows = allClients.map(client => {
        const pkgName = client.package?.name || '';
        return `
          <tr data-client-id="${escapeHtml(client.id)}" tabindex="0">
            <td class="col-name">
              <div class="name">${escapeHtml(client.clientName || '(unnamed)')}</div>
              ${client.tradingName && client.tradingName !== client.clientName
                ? `<div class="trading">${escapeHtml(client.tradingName)}</div>` : ''}
            </td>
            <td class="col-contact">
              <div class="email">${escapeHtml(client.primaryEmail)}</div>
              ${client.primaryContactName ? `<div class="person">${escapeHtml(client.primaryContactName)}</div>` : ''}
            </td>
            <td>
              ${pkgName
                ? `<span class="pkg-pill" data-pkg="${escapeHtml(pkgName)}">${escapeHtml(pkgName)}</span>`
                : '<span class="pkg-pill">No package</span>'}
            </td>
            <td>
              <span class="status-pill ${statusClass(client.status)}">${escapeHtml(client.status || 'Unknown')}</span>
            </td>
            <td><div class="mrr">${fmtMoney(client.mrr)}</div></td>
            <td>${fmtDate(client.setupDate)}</td>
            <td>${fmtDate(client.goLiveDate)}</td>
            <td class="col-counts">
              <span class="num">${client.userCount}</span> ${client.userCount === 1 ? 'user' : 'users'}
              · <span class="num">${client.entitlementCount}</span> products
            </td>
          </tr>
        `;
      }).join('');

      c.innerHTML = `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Client</th>
                <th>Primary contact</th>
                <th>Package</th>
                <th>Status</th>
                <th>MRR</th>
                <th>Setup</th>
                <th>Go-live</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;

      c.querySelectorAll('tr[data-client-id]').forEach(row => {
        row.addEventListener('click', () => openClient(row.dataset.clientId));
        row.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openClient(row.dataset.clientId);
          }
        });
      });
    }

    function openClient(id) {
      // Navigate to detail view inside the iframe
      window.location.href = '/admin/client-detail.html?id=' + encodeURIComponent(id);
    }

    function goToNewClient() {
      // Tell the parent to switch tabs
      try {
        parent.postMessage({ type: 'switch-tab', tab: 'new-client' }, '*');
      } catch {
        window.location.href = '/admin/new-client.html';
      }
    }

    // Debounce search
    let searchTimer;
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      const v = e.target.value.trim();
      searchTimer = setTimeout(() => {
        currentQuery = v;
        loadClients();
      }, 250);
    });

    document.getElementById('filter-package').addEventListener('change', (e) => {
      currentPackage = e.target.value;
      loadClients();
    });
    document.getElementById('filter-status').addEventListener('change', (e) => {
      currentStatus = e.target.value;
      loadClients();
    });

    document.getElementById('new-client-btn').addEventListener('click', goToNewClient);

    loadClients();
  </script>
</body>
</html>
