<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Travelify Offers — Type Explorer</title>
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e5e7eb;
    --text: #111827;
    --muted: #6b7280;
    --accent: #1857c4;
    --accent-hover: #143e8e;
    --accent-soft: #eff6ff;
    --success: #059669;
    --error: #dc2626;
    --warn: #d97706;
    --strike: #9ca3af;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 24px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 14px; }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    flex-wrap: wrap;
  }
  .tab {
    flex: 1;
    min-width: 120px;
    padding: 10px 14px;
    background: transparent;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab:hover { background: var(--accent-soft); color: var(--accent); }
  .tab.active { background: var(--accent); color: white; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.hidden { display: none; }
  label { font-size: 12px; color: var(--muted); font-weight: 500; }
  input, select {
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: white;
  }
  button {
    padding: 9px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .status {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    display: none;
  }
  .status.show { display: block; }
  .status.success { background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }
  .status.error { background: #fef2f2; color: var(--error); border: 1px solid #fecaca; }
  .status.loading { background: #eff6ff; color: var(--accent); border: 1px solid #bfdbfe; }
  .status.warn { background: #fffbeb; color: var(--warn); border: 1px solid #fde68a; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.08);
  }
  .card-image {
    aspect-ratio: 16 / 10;
    background: #e5e7eb center/cover no-repeat;
    position: relative;
  }
  .card-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
  }
  .card-type-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    color: white;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-pill {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(255,255,255,0.95);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .card-pill.deal {
    background: var(--success);
    color: white;
  }
  .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-name { font-weight: 600; font-size: 15px; line-height: 1.3; }
  .card-location { font-size: 13px; color: var(--muted); }
  .card-meta { font-size: 12px; color: var(--muted); }
  .card-footer {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
  }
  .card-price-block { display: flex; flex-direction: column; gap: 2px; }
  .card-price { font-weight: 700; font-size: 20px; color: var(--text); line-height: 1; }
  .card-price-was { font-size: 12px; color: var(--strike); text-decoration: line-through; }
  .card-price-sub { font-size: 11px; color: var(--muted); font-weight: normal; }
  .card-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
  }
  .card-link:hover { text-decoration: underline; }

  /* Flight-specific styling */
  .flight-route {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 12px;
    background: var(--accent-soft);
    border-bottom: 1px solid var(--border);
  }
  .flight-airport { display: flex; flex-direction: column; gap: 2px; }
  .flight-airport.right { text-align: right; }
  .flight-iata {
    font-weight: 800;
    color: var(--accent);
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }
  .flight-airport-name {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.2;
  }
  .flight-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: var(--muted);
  }
  .flight-arrow-line {
    width: 40px;
    height: 1px;
    background: var(--accent);
    position: relative;
  }
  .flight-arrow-line::after {
    content: '✈';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent-soft);
    color: var(--accent);
    padding: 0 4px;
    font-size: 14px;
  }
  .flight-stops-label {
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .flight-duration {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 6px 16px 0;
    background: var(--accent-soft);
    border-bottom: 1px solid var(--border);
  }
  .flight-detail {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .flight-detail:last-of-type { border-bottom: none; }
  .flight-detail-label {
    font-weight: 600;
    color: var(--text);
    min-width: 60px;
  }
  .flight-detail-value {
    color: var(--muted);
  }
  .flight-carrier-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: #fafbfc;
    font-size: 13px;
  }
  .flight-carrier-code {
    background: var(--text);
    color: white;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .flight-carrier-name { font-weight: 600; }
  .flight-pax {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  details {
    margin-top: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
  }
  details[open] { padding-bottom: 16px; }
  details summary { cursor: pointer; font-weight: 500; font-size: 14px; user-select: none; }
  pre {
    background: #1f2937;
    color: #d1d5db;
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 12px;
    margin-top: 12px;
    max-height: 500px;
    line-height: 1.4;
  }
  .empty {
    text-align: center;
    padding: 48px 16px;
    color: var(--muted);
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Travelify Offers — Type Explorer</h1>
  <p class="subtitle">Switch between offer types to see what each returns. Raw response panel below shows the real data shape.</p>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="Accommodation">Accommodation</button>
    <button class="tab" data-type="Flights">Flights</button>
    <button class="tab" data-type="Packages">Packages</button>
    <button class="tab" data-type="CarRental">Car Rental</button>
    <button class="tab" data-type="Any">Any (mixed)</button>
  </div>

  <div class="controls">
    <div class="field" data-show="all">
      <label for="maxOffers">Max offers</label>
      <input id="maxOffers" type="number" value="20" min="1" max="50" />
    </div>
    <div class="field" data-show="all">
      <label for="sort">Sort</label>
      <select id="sort">
        <option value="price:asc" selected>Price (low to high)</option>
        <option value="price:desc">Price (high to low)</option>
        <option value="random">Random</option>
      </select>
    </div>
    <div class="field" data-show="all">
      <label for="budgetMax">Max budget (£)</label>
      <input id="budgetMax" type="number" value="2000" min="50" />
    </div>
    <div class="field" data-show="Flights,Packages">
      <label for="origin">Origin (airport/country)</label>
      <input id="origin" type="text" placeholder="e.g. LGW, LON, GB" value="LON" />
    </div>
    <div class="field" data-show="Accommodation,Flights,Packages,Any">
      <label for="destination">Destination</label>
      <input id="destination" type="text" placeholder="e.g. ES, IT, MAD" value="ES" />
    </div>
    <div class="field" data-show="Accommodation,Packages">
      <label for="boardBasis">Board basis</label>
      <select id="boardBasis">
        <option value="">Any</option>
        <option value="RoomOnly">Room Only</option>
        <option value="BedAndBreakfast">B&amp;B</option>
        <option value="HalfBoard">Half Board</option>
        <option value="FullBoard">Full Board</option>
        <option value="AllInclusive">All Inclusive</option>
      </select>
    </div>
    <div class="field" data-show="Accommodation,Packages">
      <label for="ratingMin">Min star rating</label>
      <input id="ratingMin" type="number" value="3" min="0" max="5" step="0.5" />
    </div>
    <div class="field" data-show="Flights,Packages">
      <label for="cabinClass">Cabin class</label>
      <select id="cabinClass">
        <option value="">Any</option>
        <option value="Economy">Economy</option>
        <option value="PremiumEconomy">Premium Economy</option>
        <option value="Business">Business</option>
        <option value="First">First</option>
      </select>
    </div>
    <div class="field" data-show="Packages">
      <label for="packageType">Package type</label>
      <select id="packageType">
        <option value="Any" selected>Any</option>
        <option value="DynamicPackages">Dynamic</option>
        <option value="PackageHolidays">Package Holiday</option>
      </select>
    </div>
    <div class="field" data-show="Accommodation,Packages">
      <label for="durationMax">Max nights</label>
      <input id="durationMax" type="number" value="14" min="1" max="50" />
    </div>
    <div class="field" data-show="all">
      <button id="searchBtn">Search</button>
    </div>
  </div>

  <div id="status" class="status"></div>
  <div id="typeBreakdown" class="status"></div>

  <div id="results" class="grid"></div>

  <details open>
    <summary>Raw API response (sample record per type + full data)</summary>
    <pre id="rawResponse">(no request made yet)</pre>
  </details>
</div>

<script>
  const TRAVELIFY_ENDPOINT = 'https://api.travelify.io/widgetsvc/traveloffers';
  const APP_ID = '250';
  const PUBLIC_KEY = 'A41D180E-CBFE-4E30-A47D-FAAB424A650D';

  const $ = (id) => document.getElementById(id);
  const statusEl = $('status');
  const breakdownEl = $('typeBreakdown');
  const resultsEl = $('results');
  const rawEl = $('rawResponse');
  const btn = $('searchBtn');

  let currentType = 'Accommodation';

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentType = tab.dataset.type;
      updateFieldVisibility();
      search();
    });
  });

  function updateFieldVisibility() {
    document.querySelectorAll('.field[data-show]').forEach(f => {
      const types = f.dataset.show;
      const visible = types === 'all' || types.split(',').includes(currentType);
      f.classList.toggle('hidden', !visible);
    });
  }

  function setStatus(message, type) {
    statusEl.textContent = message;
    statusEl.className = `status show ${type}`;
  }

  function buildPayload() {
    const payload = {
      type: currentType,
      deduping: 'Aggressive',
      currency: 'GBP',
      language: 'en',
      nationality: 'GB',
      maxOffers: parseInt($('maxOffers').value) || 20,
      rollingDates: true,
      DatesMin: 7,
      DatesMax: 90,
      sort: $('sort').value,
      pricingByType: 'Person',
    };
    const budgetMax = parseInt($('budgetMax').value);
    if (budgetMax) payload.budgetMax = budgetMax;

    if (currentType === 'Accommodation' || currentType === 'Packages') {
      const board = $('boardBasis').value;
      const rating = parseFloat($('ratingMin').value);
      const dest = $('destination').value.trim();
      const durationMax = parseInt($('durationMax').value);
      if (board) payload.boardBases = [board];
      if (rating) payload.ratingMin = rating;
      if (dest) payload.destinations = [dest];
      if (durationMax) payload.durationMax = durationMax;
    }
    if (currentType === 'Flights' || currentType === 'Packages') {
      const origin = $('origin').value.trim();
      const cabin = $('cabinClass').value;
      if (origin) payload.origins = [origin];
      if (cabin) payload.cabinClasses = [cabin];
    }
    if (currentType === 'Flights') {
      const dest = $('destination').value.trim();
      if (dest) payload.destinations = [dest];
    }
    if (currentType === 'Packages') {
      const pt = $('packageType').value;
      if (pt && pt !== 'Any') payload.packageType = pt;
    }
    if (currentType === 'Any') {
      const dest = $('destination').value.trim();
      if (dest) payload.destinations = [dest];
    }
    return payload;
  }

  // ── Renderers ─────────────────────────────────────────────────────

  function renderAccommodationCard(o) {
    const acc = o.accommodation || {};
    const dest = acc.destination || {};
    const img = acc.image?.url || '';
    const rating = acc.rating ? '★'.repeat(Math.round(acc.rating)) : '';
    const nights = acc.nights ? `${acc.nights} night${acc.nights === 1 ? '' : 's'}` : '';
    const board = acc.boardBasis ? formatEnum(acc.boardBasis) : '';
    const meta = [nights, board].filter(Boolean).join(' · ');
    return `
      <div class="card">
        <div class="card-image" style="background-image: url('${escapeHtml(img)}')">
          ${rating ? `<div class="card-badge">${rating}</div>` : ''}
          <div class="card-type-badge">Hotel</div>
        </div>
        <div class="card-body">
          <div class="card-name">${escapeHtml(acc.name || 'Unnamed property')}</div>
          <div class="card-location">${escapeHtml(dest.name || '')}${dest.countryCode ? ', ' + escapeHtml(dest.countryCode) : ''}</div>
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        </div>
        ${renderPriceFooter(o)}
      </div>
    `;
  }

  // Real Flights shape: flight.{origin, destination, outboundDate, returnDate, cabinClass, direct, stops, duration, carrier, image, pricing}
  function renderFlightCard(o) {
    const f = o.flight || {};
    const og = f.origin || {};
    const dest = f.destination || {};
    const carrier = f.carrier || {};
    const pricing = f.pricing || {};

    const img = f.image?.url || '';
    const isDirect = f.direct === true;
    const stops = f.stops || 0;
    const stopsLabel = isDirect ? 'Direct' : (stops === 1 ? '1 stop' : `${stops} stops`);

    const durationLabel = f.duration ? formatDuration(f.duration) : '';
    const cabin = f.cabinClass ? formatEnum(f.cabinClass) : '';
    const refundability = pricing.refundability ? formatEnum(pricing.refundability) : '';

    const outbound = formatDateTime(f.outboundDate);
    const returnLeg = f.returnDate ? formatDateTime(f.returnDate) : null;
    const tripType = returnLeg ? 'Return' : 'One-way';

    const priceChanged = pricing.priceChanged === true && pricing.priceBeforeChange;
    const isLeadIn = pricing.isLeadIn === true;

    return `
      <div class="card">
        ${img ? `
          <div class="card-image" style="background-image: url('${escapeHtml(img)}'); aspect-ratio: 16/9;">
            <div class="card-type-badge">Flight</div>
            ${isLeadIn ? `<div class="card-pill deal">Lead-in price</div>` : ''}
          </div>
        ` : ''}

        <div class="flight-route">
          <div class="flight-airport">
            <div class="flight-iata">${escapeHtml(og.iataCode || '???')}</div>
            <div class="flight-airport-name">${escapeHtml(og.name || '')}</div>
          </div>
          <div class="flight-arrow">
            <div class="flight-arrow-line"></div>
            <div class="flight-stops-label">${escapeHtml(stopsLabel)}</div>
          </div>
          <div class="flight-airport right">
            <div class="flight-iata">${escapeHtml(dest.iataCode || '???')}</div>
            <div class="flight-airport-name">${escapeHtml(dest.name || '')}</div>
          </div>
        </div>
        ${durationLabel ? `<div class="flight-duration">${durationLabel} · ${tripType}${cabin ? ' · ' + cabin : ''}</div>` : ''}

        <div class="flight-carrier-row">
          ${carrier.code ? `<span class="flight-carrier-code">${escapeHtml(carrier.code)}</span>` : ''}
          <span class="flight-carrier-name">${escapeHtml(carrier.name || 'Unknown carrier')}</span>
          <span class="flight-pax">${o.adults || 1} adult${(o.adults || 1) === 1 ? '' : 's'}${o.children ? ', ' + o.children + ' child' + (o.children === 1 ? '' : 'ren') : ''}</span>
        </div>

        <div class="flight-detail">
          <span class="flight-detail-label">Outbound</span>
          <span class="flight-detail-value">${escapeHtml(outbound)}</span>
        </div>
        ${returnLeg ? `
          <div class="flight-detail">
            <span class="flight-detail-label">Return</span>
            <span class="flight-detail-value">${escapeHtml(returnLeg)}</span>
          </div>
        ` : ''}
        ${refundability ? `
          <div class="flight-detail">
            <span class="flight-detail-label">Fare</span>
            <span class="flight-detail-value">${escapeHtml(refundability)}</span>
          </div>
        ` : ''}

        ${renderPriceFooter(o, priceChanged ? `£${Math.round(pricing.priceBeforeChange)}` : null)}
      </div>
    `;
  }

  function renderPackageCard(o) {
    const pkg = o.package || {};
    const acc = pkg.accommodation || o.accommodation || {};
    const ob = pkg.outbound || o.outbound || {};
    const dest = acc.destination || pkg.destination || {};
    const img = acc.image?.url || pkg.image?.url || '';
    const rating = acc.rating ? '★'.repeat(Math.round(acc.rating)) : '';
    const nights = acc.nights || pkg.nights;
    const board = acc.boardBasis || pkg.boardBasis;
    const fromCode = ob.iataCode || ob.origin?.iataCode || ob.originCode || '';
    const meta = [
      nights ? `${nights} nights` : '',
      board ? formatEnum(board) : '',
      fromCode ? `from ${fromCode}` : '',
    ].filter(Boolean).join(' · ');
    return `
      <div class="card">
        <div class="card-image" style="background-image: url('${escapeHtml(img)}')">
          ${rating ? `<div class="card-badge">${rating}</div>` : ''}
          <div class="card-type-badge">Package</div>
        </div>
        <div class="card-body">
          <div class="card-name">${escapeHtml(acc.name || pkg.name || 'Unnamed package')}</div>
          <div class="card-location">${escapeHtml(dest.name || '')}${dest.countryCode ? ', ' + escapeHtml(dest.countryCode) : ''}</div>
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        </div>
        ${renderPriceFooter(o)}
      </div>
    `;
  }

  function renderCarRentalCard(o) {
    const car = o.carRental || o.car || o.vehicle || o.rental || {};
    const pickup = car.pickup || car.pickupLocation || car.location || {};
    const vehicle = car.vehicle || car;
    const img = vehicle.image?.url || car.image?.url || '';
    const name = vehicle.name || vehicle.model || car.name || 'Car rental';
    const company = car.supplier || car.company || vehicle.company || '';
    const days = car.days || car.duration || '';
    const meta = [
      company ? escapeHtml(company) : '',
      days ? `${days} day${days === 1 ? '' : 's'}` : '',
    ].filter(Boolean).join(' · ');
    return `
      <div class="card">
        ${img ? `
          <div class="card-image" style="background-image: url('${escapeHtml(img)}'); aspect-ratio: 16/9;">
            <div class="card-type-badge">Car</div>
          </div>
        ` : `
          <div class="card-image" style="background: linear-gradient(135deg, #e5e7eb, #d1d5db); aspect-ratio: 16/9; display:flex; align-items:center; justify-content:center; font-size:40px;">
            🚗
            <div class="card-type-badge">Car</div>
          </div>
        `}
        <div class="card-body">
          <div class="card-name">${escapeHtml(name)}</div>
          ${pickup.name ? `<div class="card-location">${escapeHtml(pickup.name)}</div>` : ''}
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        </div>
        ${renderPriceFooter(o)}
      </div>
    `;
  }

  function renderUnknownCard(o) {
    return `
      <div class="card">
        <div class="card-body" style="padding:20px;">
          <div class="card-name">Unknown offer type: ${escapeHtml(o.type || 'no type field')}</div>
          <div class="card-meta">See raw response below for shape.</div>
        </div>
        ${renderPriceFooter(o)}
      </div>
    `;
  }

  function renderPriceFooter(o, wasPrice) {
    const price = o.formattedPPPrice || o.formattedPrice || '';
    const sub = o.formattedPPPrice ? 'per person' : (o.formattedPrice ? 'total' : '');
    return `
      <div class="card-footer">
        <div class="card-price-block">
          ${wasPrice ? `<div class="card-price-was">${escapeHtml(wasPrice)}</div>` : ''}
          <div class="card-price">${escapeHtml(price)}</div>
          ${sub ? `<div class="card-price-sub">${sub}</div>` : ''}
        </div>
        <a class="card-link" href="${escapeHtml(o.url || '#')}" target="_blank" rel="noopener">View deal →</a>
      </div>
    `;
  }

  function renderOffers(offers) {
    if (!offers || offers.length === 0) {
      resultsEl.innerHTML = '<div class="empty">No offers matched. Try widening the filters.</div>';
      return;
    }
    resultsEl.innerHTML = offers.map(o => {
      switch (o.type) {
        case 'Accommodation': return renderAccommodationCard(o);
        case 'Flights':
        case 'Flight':       return renderFlightCard(o);
        case 'Packages':
        case 'Package':      return renderPackageCard(o);
        case 'CarRental':    return renderCarRentalCard(o);
        default:             return renderUnknownCard(o);
      }
    }).join('');
  }

  // ── Helpers ───────────────────────────────────────────────────────

  function formatEnum(s) {
    if (!s) return '';
    return String(s).replace(/([A-Z])/g, ' $1').trim();
  }

  function formatDate(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return iso; }
  }

  function formatDateTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return iso;
      const date = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      const time = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      return `${date}, ${time}`;
    } catch { return iso; }
  }

  function formatDuration(minutes) {
    if (!minutes || isNaN(minutes)) return '';
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h && m) return `${h}h ${m}m`;
    if (h) return `${h}h`;
    return `${m}m`;
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function buildBreakdown(offers) {
    if (!offers || offers.length === 0) return '';
    const counts = {};
    offers.forEach(o => {
      const t = o.type || 'unknown';
      counts[t] = (counts[t] || 0) + 1;
    });
    return Object.entries(counts).map(([t, n]) => `${n} ${t}`).join(' · ');
  }

  function buildRawSample(offers) {
    if (!offers || offers.length === 0) return '(empty data array)';
    const samples = {};
    offers.forEach(o => {
      const t = o.type || 'unknown';
      if (!samples[t]) samples[t] = o;
    });
    return JSON.stringify({
      _summary: `${offers.length} total offers, ${Object.keys(samples).length} distinct type(s)`,
      _sampleRecordPerType: samples,
      _allOffers: offers,
    }, null, 2);
  }

  async function search() {
    btn.disabled = true;
    setStatus(`Fetching ${currentType} offers...`, 'loading');
    breakdownEl.className = 'status';
    resultsEl.innerHTML = '';

    const payload = buildPayload();

    try {
      const res = await fetch(TRAVELIFY_ENDPOINT, {
        method: 'POST',
        headers: {
          'Authorization': `Token ${APP_ID}:${PUBLIC_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      rawEl.textContent = buildRawSample(data.data || []);

      if (!data.success) {
        setStatus(`API error: ${data.error || 'Unknown error'}`, 'error');
        rawEl.textContent = JSON.stringify(data, null, 2);
        return;
      }

      const offers = data.data || [];
      const count = offers.length;
      setStatus(`Got ${count} offer${count === 1 ? '' : 's'}.`, 'success');

      const breakdown = buildBreakdown(offers);
      if (breakdown && currentType === 'Any') {
        breakdownEl.textContent = `Type breakdown: ${breakdown}`;
        breakdownEl.className = 'status show warn';
      }

      renderOffers(offers);
    } catch (err) {
      setStatus(`Request failed: ${err.message}`, 'error');
      rawEl.textContent = err.stack || err.message;
    } finally {
      btn.disabled = false;
    }
  }

  btn.addEventListener('click', search);

  updateFieldVisibility();
  search();
</script>
</body>
</html>
