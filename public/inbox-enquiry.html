<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Submissions inbox · Travelgenix</title>
<meta name="robots" content="noindex,nofollow">
<style>
  /* ======================== TOKENS (shared with editor) ======================== */
  :root {
    --brand: #EC4899;
    --brand-soft: rgba(236, 72, 153, .12);
    --brand-ink: #BE185D;

    --success: #16A34A;
    --warning: #F59E0B;
    --danger: #DC2626;
    --info: #0EA5E9;

    --ink: #0F172A;
    --sub: #475569;
    --muted: #94A3B8;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --panel: #FFFFFF;
    --panel-2: #F8FAFC;
    --hover: #F1F5F9;

    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;

    --shadow-xs: 0 1px 2px rgba(15, 23, 42, .05);
    --shadow-sm: 0 1px 3px rgba(15, 23, 42, .08);
    --shadow-lg: 0 10px 30px rgba(15, 23, 42, .12);
    --shadow-xl: 0 24px 60px rgba(15, 23, 42, .18);

    /* Email delivery state palette — muted on purpose so the UI doesn't
       shout about delivery state; it's secondary info to the main triage flow */
    --email-delivered: #16A34A;  /* green */
    --email-opened:    #0EA5E9;  /* sky blue */
    --email-clicked:   #8B5CF6;  /* violet */
    --email-pending:   #F59E0B;  /* amber */
    --email-failed:    #DC2626;  /* red */
    --email-unknown:   #94A3B8;  /* muted grey */
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--panel-2);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: inherit; }

  /* =========================== LAYOUT =========================== */
  .app {
    display: grid;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    text-decoration: none;
  }
  .topbar-brand-mark {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--brand);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .topbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .topbar-sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }
  .topbar-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--sub);
    text-decoration: none;
    border-radius: 6px;
    transition: all .1s ease;
  }
  .topbar-back:hover {
    background: var(--hover);
    color: var(--ink);
  }

  /* ── Main body = sidebar + list ── */
  .body {
    display: grid;
    grid-template-columns: 260px 1fr;
    overflow: hidden;
    min-height: 0;
  }
  @media (max-width: 800px) {
    .body { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .sidebar-section {
    margin-bottom: 24px;
  }
  .sidebar-section:last-child { margin-bottom: 0; }
  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 0 0 8px 4px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    border: 0;
    background: none;
    width: 100%;
    text-align: left;
    transition: all .1s ease;
    margin-bottom: 2px;
  }
  .sidebar-item:hover {
    background: var(--hover);
    color: var(--ink);
  }
  .sidebar-item.is-active {
    background: var(--brand-soft);
    color: var(--brand-ink);
    font-weight: 600;
  }
  .sidebar-item-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    background: var(--hover);
    padding: 1px 7px;
    border-radius: 999px;
    min-width: 22px;
    text-align: center;
  }
  .sidebar-item.is-active .sidebar-item-count {
    background: rgba(236,72,153,.15);
    color: var(--brand-ink);
  }
  .sidebar-icon {
    flex-shrink: 0;
  }

  /* Email status filter dot inside sidebar item */
  .sidebar-item-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Form filter */
  .sidebar-select {
    width: 100%;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--ink);
    cursor: pointer;
    outline: none;
    transition: border-color .12s ease;
  }
  .sidebar-select:hover { border-color: var(--border-strong); }
  .sidebar-select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  .sidebar-date-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .sidebar-date-input {
    flex: 1;
    padding: 7px 10px;
    font-size: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--ink);
    outline: none;
    transition: border-color .12s ease;
  }
  .sidebar-date-input:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  .sidebar-clear-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 8px;
  }
  .sidebar-clear-btn:hover { color: var(--ink); }

  /* ── Main list area ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    background: var(--panel-2);
  }

  .list-head {
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 520px;
  }
  .search-input {
    width: 100%;
    padding: 9px 14px 9px 38px;
    font-size: 13px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    outline: none;
    transition: all .12s ease;
  }
  .search-input:focus {
    border-color: var(--brand);
    background: var(--panel);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: none;
  }
  .search-clear.is-visible { display: flex; }
  .search-clear:hover {
    background: var(--hover);
    color: var(--ink);
  }

  .list-stats {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .list-refresh {
    background: none;
    border: 1px solid var(--border);
    padding: 7px 10px;
    border-radius: 7px;
    color: var(--sub);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    transition: all .1s ease;
  }
  .list-refresh:hover {
    background: var(--hover);
    border-color: var(--border-strong);
    color: var(--ink);
  }
  .list-refresh.is-loading svg {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
  }

  .list-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 80px;
  }

  /* ── Row ── */
  .row {
    display: grid;
    grid-template-columns: 24px 140px 1fr 160px 110px 100px 120px;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s ease;
  }
  .row:hover {
    background: var(--hover);
  }
  .row.is-unread {
    background: #FFF7FB;
  }
  .row.is-unread:hover {
    background: #FFEAF4;
  }
  .row.is-selected {
    background: var(--brand-soft);
  }
  .row-unread-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--brand);
    opacity: 0;
  }
  .row.is-unread .row-unread-dot {
    opacity: 1;
  }
  .row-ref {
    font-family: -apple-system, "SF Mono", Menlo, monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row.is-unread .row-ref {
    color: var(--ink);
  }
  .row-main {
    min-width: 0;
  }
  .row-name {
    font-weight: 600;
    color: var(--ink);
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .row-email {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-email-text {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  /* Small delivery dot next to the email address. Tooltip on hover tells
     the agent what it means — no screen clutter with permanent labels */
  .email-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--email-unknown);
    cursor: help;
    position: relative;
  }
  .email-dot[data-state="Delivered"]    { background: var(--email-delivered); }
  .email-dot[data-state="Opened"]       { background: var(--email-opened); }
  .email-dot[data-state="Clicked"]      { background: var(--email-clicked); }
  .email-dot[data-state="Processed"],
  .email-dot[data-state="Deferred"]     { background: var(--email-pending); }
  .email-dot[data-state="Bounced"],
  .email-dot[data-state="Dropped"],
  .email-dot[data-state="Spam Reported"]{ background: var(--email-failed); }
  .row-destinations {
    font-size: 13px;
    color: var(--sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-form {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-travellers {
    font-size: 12px;
    color: var(--sub);
    white-space: nowrap;
  }
  .row-date {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    text-align: right;
  }

  @media (max-width: 900px) {
    .row {
      grid-template-columns: 20px 1fr auto;
    }
    .row-ref, .row-destinations, .row-form, .row-travellers { display: none; }
  }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
    white-space: nowrap;
  }
  .badge-new       { background: var(--brand-soft); color: var(--brand-ink); }
  .badge-read      { background: var(--hover); color: var(--sub); }
  .badge-archived  { background: #F1F5F9; color: var(--muted); }
  .badge-converted { background: rgba(22, 163, 74, .12); color: var(--success); }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: var(--hover);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: 13px;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.6;
  }

  /* Loading state */
  .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  /* Load more footer */
  .load-more {
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .load-more-btn {
    padding: 9px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    cursor: pointer;
    transition: all .1s ease;
  }
  .load-more-btn:hover {
    background: var(--hover);
    border-color: var(--border-strong);
    color: var(--ink);
  }
  .load-more-btn:disabled {
    opacity: .6;
    cursor: not-allowed;
  }

  /* =========================== DETAIL DRAWER =========================== */
  /* Slides in from the right when a row is clicked. Covers the list but
     doesn't fully block the page — the sidebar stays visible. Designed to
     support rapid triage: open, scan, close, open next. */
  .drawer-scrim {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.4);
    backdrop-filter: blur(2px);
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .drawer-scrim.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 560px;
    max-width: 100vw;
    background: var(--panel);
    box-shadow: var(--shadow-xl);
    z-index: 1001;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s cubic-bezier(.2, 0, .2, 1);
    overflow: hidden;
  }
  .drawer.is-open {
    transform: translateX(0);
  }

  /* Drawer header — sticky at top with close button, reference, status */
  .drawer-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }
  .drawer-head-info {
    flex: 1;
    min-width: 0;
  }
  .drawer-head-ref {
    font-family: -apple-system, "SF Mono", Menlo, monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .drawer-head-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .drawer-head-meta {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .drawer-head-meta-sep {
    color: var(--border-strong);
  }
  .drawer-close {
    width: 32px;
    height: 32px;
    border: 0;
    background: transparent;
    border-radius: 7px;
    color: var(--muted);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .12s ease;
  }
  .drawer-close:hover {
    background: var(--hover);
    color: var(--ink);
  }

  /* Drawer body — scrolls independently */
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 40px;
  }

  /* Status segmented control — sits at the top of the drawer body */
  .status-seg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    padding: 4px;
    background: var(--panel-2);
    border-radius: 9px;
    margin-bottom: 20px;
  }
  .status-seg-btn {
    padding: 8px 6px;
    border: 0;
    background: transparent;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--sub);
    cursor: pointer;
    transition: all .12s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .status-seg-btn:hover:not(.is-active) {
    background: var(--hover);
    color: var(--ink);
  }
  .status-seg-btn.is-active {
    background: var(--panel);
    color: var(--ink);
    box-shadow: var(--shadow-xs);
  }
  .status-seg-btn.is-active[data-status="New"] { color: var(--brand-ink); }
  .status-seg-btn.is-active[data-status="Converted"] { color: var(--success); }

  /* Primary action row — Reply / Call / Copy */
  .drawer-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .drawer-action {
    flex: 1;
    padding: 9px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: all .12s ease;
    text-decoration: none;
    white-space: nowrap;
  }
  .drawer-action:hover {
    background: var(--hover);
    border-color: var(--border-strong);
  }
  .drawer-action.is-primary {
    background: var(--brand);
    border-color: var(--brand);
    color: #fff;
  }
  .drawer-action.is-primary:hover {
    background: #DB2777;
    border-color: #DB2777;
  }
  .drawer-action.is-disabled {
    opacity: .5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Drawer sections — grouped data blocks */
  .drawer-section {
    margin-bottom: 22px;
  }
  .drawer-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 0 0 10px;
  }
  .drawer-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  /* Data rows within drawer cards */
  .data-row {
    display: flex;
    gap: 16px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.5;
  }
  .data-row:first-child { padding-top: 0; }
  .data-row:last-child {
    padding-bottom: 0;
    border-bottom: 0;
  }
  .data-row-label {
    width: 110px;
    flex-shrink: 0;
    color: var(--muted);
    font-weight: 500;
  }
  .data-row-value {
    flex: 1;
    color: var(--ink);
    word-break: break-word;
  }
  .data-row-value.is-empty {
    color: var(--muted);
    font-style: italic;
  }
  .data-row-value a {
    color: var(--brand-ink);
    text-decoration: none;
  }
  .data-row-value a:hover {
    text-decoration: underline;
  }

  /* Destination chips inside a data row */
  .dest-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .dest-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    background: var(--brand-soft);
    color: var(--brand-ink);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .interest-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .interest-chip {
    display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    background: var(--hover);
    color: var(--sub);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }

  /* Consent indicators — a clear visual yes/no pair */
  .consent-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .consent-item {
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .consent-item-label {
    flex: 1;
    color: var(--sub);
    font-weight: 500;
  }
  .consent-item-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;

    align-items: center;
    justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }
  .consent-item.is-yes .consent-item-icon { background: var(--success); }
  .consent-item.is-no  .consent-item-icon { background: var(--border-strong); color: var(--muted); }

  /* Internal note editor */
  .note-editor {
    background: #FFFBEB;
    border: 1px solid #FEF3C7;
    border-radius: 10px;
    padding: 0;
    overflow: hidden;
  }
  .note-editor-textarea {
    width: 100%;
    min-height: 84px;
    padding: 12px 14px;
    border: 0;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink);
    outline: none;
    resize: vertical;
    display: block;
  }
  .note-editor-textarea::placeholder {
    color: #D97706;
    opacity: .7;
  }
  .note-editor-footer {
    padding: 6px 14px 10px;
    font-size: 11px;
    color: #92400E;
    opacity: .75;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .note-editor-footer.is-saving { color: #92400E; }
  .note-editor-footer.is-saved  { color: var(--success); opacity: 1; }
  .note-editor-footer svg { flex-shrink: 0; }

  /* Routing history */
  .routing-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .routing-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .routing-row-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .routing-row-dot.ok       { background: var(--success); }
  .routing-row-dot.failed   { background: var(--danger); }
  .routing-row-dot.pending  { background: var(--warning); }
  .routing-row-dot.skipped  { background: var(--border-strong); }
  .routing-row-name {
    font-weight: 600;
    color: var(--ink);
    flex: 1;
  }
  .routing-row-status {
    font-size: 12px;
    color: var(--muted);
    text-transform: capitalize;
  }

  /* Email delivery timeline — drawer section showing SendGrid event history */
  .email-summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
  }
  .email-summary-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    background: var(--email-unknown);
  }
  .email-summary-dot[data-state="Delivered"]    { background: var(--email-delivered); }
  .email-summary-dot[data-state="Opened"]       { background: var(--email-opened); }
  .email-summary-dot[data-state="Clicked"]      { background: var(--email-clicked); }
  .email-summary-dot[data-state="Processed"],
  .email-summary-dot[data-state="Deferred"]     { background: var(--email-pending); }
  .email-summary-dot[data-state="Bounced"],
  .email-summary-dot[data-state="Dropped"],
  .email-summary-dot[data-state="Spam Reported"]{ background: var(--email-failed); }
  .email-summary-label {
    flex: 1;
    font-weight: 600;
    color: var(--ink);
  }
  .email-summary-hint {
    font-size: 12px;
    color: var(--muted);
  }

  .email-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 4px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .email-timeline-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    position: relative;
    font-size: 12px;
  }
  .email-timeline-row:not(:last-child)::after {
    /* Vertical connector line between timeline dots */
    content: '';
    position: absolute;
    left: 5px;
    top: 18px;
    bottom: -2px;
    width: 1px;
    background: var(--border);
  }
  .email-timeline-dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;

    box-shadow: 0 0 0 2px var(--panel-2);

    position: relative;
  }
  .email-timeline-dot[data-event="delivered"]  { background: var(--email-delivered); }
  .email-timeline-dot[data-event="open"]       { background: var(--email-opened); }
  .email-timeline-dot[data-event="click"]      { background: var(--email-clicked); }
  .email-timeline-dot[data-event="processed"],
  .email-timeline-dot[data-event="deferred"]   { background: var(--email-pending); }
  .email-timeline-dot[data-event="bounce"],
  .email-timeline-dot[data-event="dropped"],

  .email-timeline-main {
    flex: 1;
    min-width: 0;

  .email-timeline-title {
    font-weight: 600;
    color: var(--ink);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;

  .email-timeline-kind {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;

  /* Collapsible — used for technical context and raw JSON */

    border-radius: 10px;

    display: none;
    padding: 0 16px 14px;

  .collapsible.is-open .collapsible-body {

  }

  /* Raw JSON display */
  .json-block {
    background: #0F172A;
    color: #E2E8F0;
    padding: 14px 16px;

  /* =========================== LOGIN OVERLAY =========================== */

  .login-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .login-sub {

    color: var(--muted);

  .login-btn {

    align-items: center;

    padding: 10px 20px;

    border: 0;
    border-radius: 8px;
    font-size: 14px;

  /* =========================== TOAST =========================== */
  .toast-wrap {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10000;
    display: flex;
    flex-direction: column;

  .toast.success { background: var(--success); }
  .toast.warning { background: var(--warning); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<script>
/* =========================== UTILITIES =========================== */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

function showToast(msg, kind = 'info', ms = 3000) {
  const wrap = $('#toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (kind === 'success' || kind === 'warning' || kind === 'error' ? ' ' + kind : '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, ms);
}

// Format an ISO date/time for list-view "2h ago" / "Yesterday" / "3 Apr" style
function formatRelativeDate(iso) {
  if (!iso) return '';
  const date = new Date(iso);
  if (isNaN(date)) return '';
  const now = new Date();
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHour = Math.floor(diffMin / 60);
  const diffDay = Math.floor(diffHour / 24);
  if (diffMin < 1) return 'Just now';
  if (diffMin < 60) return diffMin + 'm ago';
  if (diffHour < 24) return diffHour + 'h ago';
  if (diffDay === 1) return 'Yesterday';
  if (diffDay < 7) return diffDay + 'd ago';
  // Older — show "3 Apr" style
  return date.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
}

// Format a unix timestamp (seconds) from SendGrid events
function formatEventTime(unixSec) {
  if (!unixSec) return '';
  const date = new Date(unixSec * 1000);
  if (isNaN(date)) return '';
  return date.toLocaleString(undefined, {
    day: 'numeric', month: 'short', hour: 'numeric', minute: '2-digit'
  });
}

function formatDepartDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// Destinations come as a JSON array of objects (or plain strings if legacy).
// Summarise into a single string for the list row.
function summariseDestinations(dests) {
  if (!dests) return '';
  if (!Array.isArray(dests)) return String(dests);
  if (dests.length === 0) return '';
  const names = dests.map(d => {
    if (typeof d === 'string') return d;
    return d.name || d.id || '';
  }).filter(Boolean);
  if (names.length === 0) return '';
  if (names.length === 1) return names[0];
  if (names.length === 2) return names[0] + ' + ' + names[1];
  return names[0] + ' + ' + (names.length - 1) + ' more';
}

function travellersText(adults, children) {
  const a = adults || 0;
  const c = children || 0;
  if (a + c === 0) return '—';
  const parts = [];
  if (a > 0) parts.push(a + ' adult' + (a === 1 ? '' : 's'));
  if (c > 0) parts.push(c + ' child' + (c === 1 ? '' : 'ren'));
  return parts.join(', ');
}

// Friendly, user-facing descriptions of email states. Keep these short —
// they appear in tooltips and compact labels.
const EMAIL_STATE_DESCRIPTIONS = {
  'Processed':     'Email sent to SendGrid, awaiting delivery',
  'Deferred':      'Delivery temporarily deferred by recipient server',
  'Delivered':     'Email delivered to recipient inbox',
  'Opened':        'Recipient opened the email',
  'Clicked':       'Recipient clicked a link in the email',
  'Bounced':       'Email bounced — address invalid or rejected',
  'Dropped':       'SendGrid did not attempt delivery (spammy, suppressed)',
  'Spam Reported': 'Recipient marked the email as spam',
};

// Map SendGrid raw event names to human-friendly titles for the timeline
const EVENT_TITLES = {
  processed:   'Accepted by SendGrid',
  deferred:    'Delivery deferred',
  delivered:   'Delivered to inbox',
  open:        'Opened',
  click:       'Link clicked',
  bounce:      'Bounced',
  dropped:     'Dropped',
  spamreport:  'Marked as spam',
  unsubscribe: 'Unsubscribed',
};

/* =========================== STATE =========================== */
const state = {
  session: null,
  status: 'New,Read',
  emailStatus: '',   // comma-separated list, empty = any
  formId: '',
  q: '',
  from: '',
  to: '',
  cursor: '',
  items: [],
  counts: { active: 0, new: 0, converted: 0, archived: 0 },
  loading: false,
  forms: [],  // populated lazily from list results
};

/* =========================== AUTH =========================== */
function loadSession() {
  try {
    const raw = sessionStorage.getItem('tgw_session');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function ensureSession() {
  state.session = loadSession();
  if (!state.session || !state.session.token) {
    $('#login-overlay').classList.add('is-visible');
    return false;
  }
  $('#app').style.display = 'grid';
  $('#topbar-sub').textContent = state.session.email || '';
  return true;
}

function authedFetch(url, opts = {}) {
  const headers = opts.headers || {};
  if (state.session && state.session.token) {
    headers['Authorization'] = 'Bearer ' + state.session.token;
  }
  return fetch(url, Object.assign({}, opts, { headers }));
}

/* =========================== API =========================== */
async function fetchSubmissions(append = false) {
  state.loading = true;
  renderList();
  $('#btn-refresh').classList.add('is-loading');

  const params = new URLSearchParams({
    status: state.status,
    limit: '50',
  });
  if (state.formId) params.set('formId', state.formId);
  if (state.q) params.set('q', state.q);
  if (state.from) params.set('from', state.from);
  if (state.to) params.set('to', state.to);
  if (state.emailStatus) params.set('emailStatus', state.emailStatus);
  if (append && state.cursor) params.set('cursor', state.cursor);

  try {
    const res = await authedFetch('/api/enquiry/submissions?' + params.toString());
    if (res.status === 401) {
      $('#login-overlay').classList.add('is-visible');
      $('#app').style.display = 'none';
      return;
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Request failed');
    }
    const data = await res.json();

    if (append) {
      state.items = state.items.concat(data.submissions || []);
    } else {
      state.items = data.submissions || [];
    }
    state.cursor = data.nextCursor || '';

    // Update form filter dropdown from submissions seen so far
    updateFormFilterFromItems();

    // Update sidebar counts (rough — based on current page)
    // For proper counts we'd need a count endpoint; MVP shows "current view" totals
    updateStats();

  } catch (err) {
    console.error('[inbox] fetchSubmissions failed', err);
    showToast('Failed to load submissions: ' + err.message, 'error');
    state.items = [];
  } finally {
    state.loading = false;
    $('#btn-refresh').classList.remove('is-loading');
    renderList();
  }
}

/* =========================== RENDERING =========================== */
function renderList() {
  const scroll = $('#list-scroll');

  if (state.loading && state.items.length === 0) {
    scroll.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading submissions…</div>
      </div>
    `;
    return;
  }

  if (state.items.length === 0) {
    const hasFilter = state.q || state.formId || state.from || state.to || state.emailStatus;
    scroll.innerHTML = `
      <div class="empty">
        <span class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <div class="empty-title">${hasFilter ? 'Nothing matches those filters' : 'No submissions yet'}</div>
        <div class="empty-sub">${hasFilter
          ? 'Try clearing a filter or adjusting the date range.'
          : 'When visitors submit one of your enquiry forms, their details will land here for you to pick up.'}</div>
      </div>
    `;
    return;
  }

  // Render rows
  const rows = state.items.map(sub => renderRow(sub)).join('');
  const loadMore = state.cursor
    ? `<div class="load-more"><button class="load-more-btn" id="btn-load-more">Load more</button></div>`
    : '';
  scroll.innerHTML = rows + loadMore;

  // Wire row clicks
  $$('.row').forEach(r => {
    r.addEventListener('click', () => openSubmission(r.getAttribute('data-id')));
  });

  // Wire load-more
  const lm = $('#btn-load-more');
  if (lm) lm.addEventListener('click', () => fetchSubmissions(true));

  // Update stats
  const stats = $('#list-stats');
  stats.textContent = state.items.length + ' submission' + (state.items.length === 1 ? '' : 's');
  if (state.cursor) stats.textContent += ' (more available)';
}

function renderRow(sub) {
  const fullName = [sub.firstName, sub.lastName].filter(Boolean).join(' ') || '(no name)';
  const destText = summariseDestinations(sub.destinations);
  const travText = travellersText(sub.adults, sub.children);
  const dateText = formatRelativeDate(sub.submittedAt);
  const badgeClass = 'badge-' + sub.status.toLowerCase();
  const unread = sub.unread ? ' is-unread' : '';

  // Email delivery dot — subtle indicator next to the email address so agents
  // can spot bounces / unopened emails at a glance. Null status = no dot
  // (most likely means the email hasn't moved through SendGrid yet).
  const emailDot = sub.emailStatus
    ? `<span class="email-dot" data-state="${escapeHtml(sub.emailStatus)}" title="${escapeHtml(EMAIL_STATE_DESCRIPTIONS[sub.emailStatus] || sub.emailStatus)}" aria-label="Email ${escapeHtml(sub.emailStatus)}"></span>`
    : '';

  return `
    <div class="row${unread}" data-id="${escapeHtml(sub.id)}" role="button" tabindex="0">
      <span class="row-unread-dot" aria-hidden="true"></span>
      <div class="row-ref">${escapeHtml(sub.reference || '—')}</div>
      <div class="row-main">
        <div class="row-name">${escapeHtml(fullName)}</div>
        <div class="row-email">
          ${emailDot}
          <span class="row-email-text">${escapeHtml(sub.email || '—')}</span>
        </div>
      </div>
      <div class="row-destinations">${escapeHtml(destText) || '—'}</div>
      <div class="row-form">${escapeHtml(sub.formName || sub.formId || '—')}</div>
      <div class="row-travellers">${escapeHtml(travText)}</div>
      <div class="row-date">
        <span class="badge ${badgeClass}">${escapeHtml(sub.status)}</span>
        <div style="margin-top: 4px;">${escapeHtml(dateText)}</div>
      </div>
    </div>
  `;
}

function updateStats() {
  // Count items by status in the current result set
  const counts = { active: 0, new: 0, converted: 0, archived: 0 };
  state.items.forEach(s => {
    if (s.status === 'New' || s.status === 'Read') counts.active++;
    if (s.status === 'New') counts.new++;
    if (s.status === 'Converted') counts.converted++;
    if (s.status === 'Archived') counts.archived++;
  });
  // These are current-view counts, not true global counts.
  // MVP — if agents want "how many unread across everything", we'd add a count endpoint.
  $('#count-active').textContent = counts.active || '—';
  $('#count-new').textContent = counts.new || '—';
  $('#count-converted').textContent = counts.converted || '—';
  $('#count-archived').textContent = counts.archived || '—';
}

function updateFormFilterFromItems() {
  // Build set of (formId, formName) from the loaded items
  const formMap = new Map();
  state.items.forEach(s => {
    if (s.formId && !formMap.has(s.formId)) {
      formMap.set(s.formId, s.formName || s.formId);
    }
  });
  const forms = Array.from(formMap.entries()).map(([id, name]) => ({ id, name }));
  forms.sort((a, b) => a.name.localeCompare(b.name));

  // Keep existing selection if still present
  const current = state.formId;
  const sel = $('#form-filter');
  sel.innerHTML = '<option value="">All forms</option>' +
    forms.map(f => `<option value="${escapeHtml(f.id)}"${f.id === current ? ' selected' : ''}>${escapeHtml(f.name)}</option>`).join('');
  state.forms = forms;
}

/* ============================ DRAWER ============================ */
// Drawer state — the open submission and anything in flight
const drawerState = {
  open: false,
  loading: false,
  id: null,
  submission: null,
  noteDebounce: null,
  noteSaving: false,
  noteLastSavedAt: null,
};

// Open a submission's detail drawer. Fetches the full record, auto-marks
// as read server-side, updates the list row's unread/status visual state
// once the server responds.
async function openSubmission(id) {
  // Visually mark this row as selected so the agent sees which one is open
  $$('.row').forEach(r => r.classList.remove('is-selected'));
  const row = document.querySelector(`.row[data-id="${id}"]`);
  if (row) row.classList.add('is-selected');

  drawerState.open = true;
  drawerState.loading = true;
  drawerState.id = id;
  drawerState.submission = null;

  $('#drawer-scrim').classList.add('is-open');
  $('#drawer').classList.add('is-open');
  renderDrawer();

  try {
    const res = await authedFetch('/api/enquiry/submissions?id=' + encodeURIComponent(id));
    if (res.status === 401) {
      $('#login-overlay').classList.add('is-visible');
      $('#app').style.display = 'none';
      return;
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Failed to load submission');
    }
    const data = await res.json();
    drawerState.submission = data.submission;
    drawerState.loading = false;
    renderDrawer();

    // Update the list row to reflect the auto-mark-as-read the server performed.
    // The server flips New→Read and stamps agentReadAt, so the list should
    // now show no unread dot and the "Read" badge instead of "New".
    const item = state.items.find(s => s.id === id);
    if (item) {
      item.status = data.submission.status;
      item.agentReadAt = data.submission.agentReadAt;
      item.unread = false;
      renderList();
      // Re-apply selection since renderList rebuilt the DOM
      const selRow = document.querySelector(`.row[data-id="${id}"]`);
      if (selRow) selRow.classList.add('is-selected');
    }
  } catch (err) {
    console.error('[drawer] load failed', err);
    drawerState.loading = false;
    drawerState.submission = null;
    showToast('Failed to load submission: ' + err.message, 'error');
    renderDrawer();
  }
}

function closeDrawer() {
  drawerState.open = false;
  drawerState.submission = null;
  drawerState.id = null;
  // Cancel any pending note save — the autosave endpoint fires on blur
  // too so we don't lose in-flight edits, but cancel the timer to be safe
  if (drawerState.noteDebounce) {
    clearTimeout(drawerState.noteDebounce);
    drawerState.noteDebounce = null;
  }
  $('#drawer-scrim').classList.remove('is-open');
  $('#drawer').classList.remove('is-open');
  $$('.row').forEach(r => r.classList.remove('is-selected'));
}

// Main renderer. Called on open, on status change, on load finish.
function renderDrawer() {
  const drawer = $('#drawer');

  if (drawerState.loading) {
    drawer.innerHTML = `
      <div class="drawer-head">
        <div class="drawer-head-info">
          <div class="drawer-head-name" style="color: var(--muted);">Loading…</div>
        </div>
        <button class="drawer-close" type="button" id="drawer-close-btn" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="drawer-loading">
        <div class="spinner"></div>
        <div>Fetching submission…</div>
      </div>
    `;
    wireDrawerClose();
    return;
  }

  const sub = drawerState.submission;
  if (!sub) {
    drawer.innerHTML = `
      <div class="drawer-head">
        <div class="drawer-head-info">
          <div class="drawer-head-name">Could not load submission</div>
        </div>
        <button class="drawer-close" type="button" id="drawer-close-btn" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="drawer-error">
        The submission could not be loaded. It may have been deleted or you may not have access.
      </div>
    `;
    wireDrawerClose();
    return;
  }

  // Format key strings
  const fullName = sub.contact.fullName || '(no name provided)';
  const when = sub.submittedAt
    ? new Date(sub.submittedAt).toLocaleString(undefined, { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: 'numeric', minute: '2-digit' })
    : '';

  drawer.innerHTML = `
    <div class="drawer-head">
      <div class="drawer-head-info">
        <div class="drawer-head-ref">${escapeHtml(sub.reference || '—')}</div>
        <div class="drawer-head-name">${escapeHtml(fullName)}</div>
        <div class="drawer-head-meta">
          <span>${escapeHtml(sub.form.name || sub.form.id || 'Unknown form')}</span>
          <span class="drawer-head-meta-sep">·</span>
          <span>${escapeHtml(when)}</span>
        </div>
      </div>
      <button class="drawer-close" type="button" id="drawer-close-btn" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="drawer-body">

      ${renderStatusSegmented(sub)}

      ${renderActionRow(sub)}

      ${renderTripSection(sub)}

      ${renderContactSection(sub)}

      ${renderConsentSection(sub)}

      ${renderNoteSection(sub)}

      ${renderEmailDeliverySection(sub)}

      ${renderRoutingSection(sub)}

      ${renderTechnicalSection(sub)}

      ${renderRawSection(sub)}

    </div>
  `;

  wireDrawerClose();
  wireStatusSegmented();
  wireNoteEditor();
  wireCollapsibles();
  wireCopyButtons();
}

function wireDrawerClose() {
  const btn = document.getElementById('drawer-close-btn');
  if (btn) btn.addEventListener('click', closeDrawer);
}

  const trip = sub.trip;

  const destText = renderDestinationChips(trip.destinations);

  const durationText = renderDurationText(trip);

  const budgetText = trip.budgetPP
    ? '£' + Number(trip.budgetPP).toLocaleString()
    : '';
  const starsText = trip.stars ? (trip.stars + '★') : '';
  const interestsHtml = renderInterestChips(trip.interests);

  const rows = [
    rowHtml('Destinations', destText, destText ? '' : 'is-empty'),
    rowHtml('From', trip.departureAirport || '—', trip.departureAirport ? '' : 'is-empty'),
    rowHtml('Travel dates', datesText || '—', datesText ? '' : 'is-empty'),
    rowHtml('Duration', durationText || '—', durationText ? '' : 'is-empty'),

// Email delivery section — summarises the SendGrid event log for this
// submission so agents can tell whether the customer actually received and
// opened the auto-reply, or whether the agent-notification email bounced.
function renderEmailDeliverySection(sub) {
  const email = sub.email || { status: null, events: [] };
  // If we've never received any webhook events, don't render the section at
  // all — keeps the drawer clean for older submissions that predate this
  // feature, and for brand-new submissions where events haven't arrived yet.
  if (!email.status && (!email.events || email.events.length === 0)) {
    return '';
  }

  const summary = email.status
    ? `<div class="email-summary">
        <span class="email-summary-dot" data-state="${escapeHtml(email.status)}"></span>
        <span class="email-summary-label">${escapeHtml(email.status)}</span>
        <span class="email-summary-hint">${escapeHtml(EMAIL_STATE_DESCRIPTIONS[email.status] || '')}</span>
      </div>`
    : '';

  // Sort events oldest → newest for timeline display. Fall back gracefully
  // if events are malformed.
  const events = Array.isArray(email.events) ? email.events.slice() : [];
  events.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

  const timelineRows = events.map(ev => {
    const title = EVENT_TITLES[ev.event] || ev.event;
    const when = formatEventTime(ev.timestamp);
    const kind = ev.emailKind === 'customer-auto-reply'
      ? '<span class="email-timeline-kind is-customer">Customer</span>'
      : (ev.emailKind === 'agent-notification'
        ? '<span class="email-timeline-kind">Agent</span>'
        : '');
    // Bounces + drops often include a human-readable reason — show it
    const reason = ev.reason
      ? `<div class="email-timeline-reason">${escapeHtml(ev.reason)}</div>`
      : '';
    // Recipient — useful when multiple recipients are on the same submission
    // (e.g. agent notifications cc'd to multiple team members)
    const meta = [when, ev.email].filter(Boolean).map(escapeHtml).join(' · ');
    return `
      <div class="email-timeline-row">
        <span class="email-timeline-dot" data-event="${escapeHtml(ev.event || '')}"></span>
        <div class="email-timeline-main">
          <div class="email-timeline-title">
            <span>${escapeHtml(title)}</span>
            ${kind}
          </div>
          <div class="email-timeline-meta">${meta}</div>
          ${reason}
        </div>
      </div>
    `;
  }).join('');

  const timeline = events.length
    ? `<div class="email-timeline">${timelineRows}</div>`
    : '';

  return `
    <div class="drawer-section">
      <div class="drawer-section-title">Email delivery</div>
      ${summary}
      ${timeline}
    </div>
  `;
}

function renderRoutingSection(sub) {
  const rs = sub.routingStatus;
  if (!rs || typeof rs !== 'object') {
    return `
      <div class="drawer-section">
        <div class="drawer-section-title">Routing history</div>
        <div class="drawer-card" style="color: var(--muted); font-size: 13px; font-style: italic;">No routing history recorded for this submission.</div>
      </div>
    `;
  }

  const labels = {
    email: 'Email notification',
    googleSheets: 'Google Sheets',
    airtable: 'Airtable',
    webhook: 'Webhook',
    lunaChat: 'Luna Chat',
    lunaMarketing: 'Luna Marketing',
    lunaWork: 'Luna Work',
    autoReply: 'Customer auto-reply',
  };

  const rows = Object.entries(rs).map(([key, value]) => {
    const statusClass = value === 'ok' ? 'ok'
      : value === 'failed' ? 'failed'
      : value === 'pending' ? 'pending'
      : 'skipped';
    const statusText = value === 'ok' ? 'Delivered'
      : value === 'failed' ? 'Failed'
      : value === 'pending' ? 'Pending'
      : (value === 'skipped' || value === 'disabled') ? 'Not sent'
      : value;
    return `
      <div class="routing-row">
        <span class="routing-row-dot ${statusClass}"></span>
        <span class="routing-row-name">${escapeHtml(labels[key] || key)}</span>
        <span class="routing-row-status">${escapeHtml(statusText)}</span>
      </div>
    `;
  }).join('');

  return `
    <div class="drawer-section">
      <div class="drawer-section-title">Routing history</div>
      <div class="routing-list">${rows}</div>
    </div>
  `;
}

function renderTechnicalSection(sub) {
  const c = sub.context;
  const hasAny = c.sourceUrl || c.ipAddress || c.userAgent || c.locale;
  if (!hasAny) return '';

  const rows = [
    rowHtml('Source page', c.sourceUrl
      ? `<a href="${encodeHtmlAttr(c.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(c.sourceUrl)}</a>`
      : '—', c.sourceUrl ? '' : 'is-empty'),
    rowHtml('IP address', c.ipAddress || '—', c.ipAddress ? '' : 'is-empty'),
    rowHtml('Locale', c.locale || '—', c.locale ? '' : 'is-empty'),
    rowHtml('User agent', c.userAgent ? `<span style="font-family: -apple-system, 'SF Mono', Menlo, monospace; font-size: 11px;">${escapeHtml(c.userAgent)}</span>` : '—', c.userAgent ? '' : 'is-empty'),
  ];

  return `
    <div class="drawer-section">
      <div class="drawer-section-title">Technical context</div>
      <div class="collapsible">
        <button type="button" class="collapsible-head" data-collapse>
          <svg class="collapsible-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span>Show visitor context</span>
        </button>
        <div class="collapsible-body">
          ${rows.join('')}
        </div>
      </div>
    </div>
  `;
}

function renderRawSection(sub) {
  if (!sub.rawPayload) return '';
  const jsonStr = JSON.stringify(sub.rawPayload, null, 2);
  return `
    <div class="drawer-section">
      <div class="drawer-section-title">Raw submission data</div>
      <div class="collapsible">
        <button type="button" class="collapsible-head" data-collapse>
          <svg class="collapsible-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span>Show raw JSON (${jsonStr.length} chars)</span>
        </button>
        <div class="collapsible-body">
          <div class="json-block">${escapeHtml(jsonStr)}</div>
        </div>
      </div>
    </div>
  `;
}

/* ---- Rendering helpers used inside the drawer ---- */
function rowHtml(label, value, extraClass) {
  return `
    <div class="data-row">
      <div class="data-row-label">${escapeHtml(label)}</div>
      <div class="data-row-value ${extraClass || ''}">${value}</div>
    </div>
  `;
}

function renderDestinationChips(dests) {
  if (!dests || !Array.isArray(dests) || dests.length === 0) return '';
  return '<div class="dest-chips">' +
    dests.map(d => {
      const name = typeof d === 'string' ? d : (d.name || d.id || '');
      if (!name) return '';
      const region = (typeof d === 'object' && d.region) ? ` · ${escapeHtml(d.region)}` : '';
      return `<span class="dest-chip">${escapeHtml(name)}${region}</span>`;
    }).filter(Boolean).join('') +
    '</div>';
}

function renderInterestChips(interests) {
  if (!interests || !Array.isArray(interests) || interests.length === 0) return '';
  return '<div class="interest-chips">' +
    interests.map(i => `<span class="interest-chip">${escapeHtml(i)}</span>`).join('') +
    '</div>';
}

function renderDatesText(trip) {
  if (!trip.departDate && !trip.returnDate) {
    return trip.flexibleDates ? 'Flexible' : '';
  }
  const depart = trip.departDate ? new Date(trip.departDate).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' }) : '';
  const ret = trip.returnDate ? new Date(trip.returnDate).toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' }) : '';
  let text = depart;
  if (ret) text += (depart ? ' → ' : '') + ret;
  if (trip.flexibleDates) text += ' (flexible)';
  return text;
}

function renderDurationText(trip) {
  if (trip.durationNights) {
    return trip.durationNights + ' night' + (trip.durationNights === 1 ? '' : 's');
  }
  if (trip.customDuration) return trip.customDuration;
  return '';
}

function renderTravellersDetail(trip) {
  const parts = [];
  if (trip.adults > 0) parts.push(trip.adults + ' adult' + (trip.adults === 1 ? '' : 's'));
  if (trip.children > 0) {
    let c = trip.children + ' child' + (trip.children === 1 ? '' : 'ren');
    if (trip.childAges && Array.isArray(trip.childAges) && trip.childAges.length) {
      c += ' (ages ' + trip.childAges.join(', ') + ')';
    }
    parts.push(c);
  }
  if (trip.infants > 0) parts.push(trip.infants + ' infant' + (trip.infants === 1 ? '' : 's'));
  return parts.join(', ');
}

function encodeHtmlAttr(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* ---- Drawer wiring ---- */
function wireStatusSegmented() {
  $$('.status-seg-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const newStatus = btn.getAttribute('data-status');
      if (newStatus === drawerState.submission.status) return;
      updateStatus(newStatus);
    });
  });
}

async function updateStatus(newStatus) {
  if (!drawerState.submission) return;
  const id = drawerState.submission.id;
  const previousStatus = drawerState.submission.status;

  // Optimistic UI — flip visual state immediately
  drawerState.submission.status = newStatus;
  $$('.status-seg-btn').forEach(b => {
    b.classList.toggle('is-active', b.getAttribute('data-status') === newStatus);
    b.setAttribute('aria-pressed', b.getAttribute('data-status') === newStatus ? 'true' : 'false');
  });

  // Update the list row's badge + unread state
  const item = state.items.find(s => s.id === id);
  if (item) {
    item.status = newStatus;
    item.unread = false;
    renderList();
    const selRow = document.querySelector(`.row[data-id="${id}"]`);
    if (selRow) selRow.classList.add('is-selected');
  }

  try {
    const res = await authedFetch('/api/enquiry/submissions?id=' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Update failed');
    }
    showToast(`Marked as ${newStatus}`, 'success', 1800);
  } catch (err) {
    console.error('[drawer] status update failed', err);
    // Revert optimistic change
    drawerState.submission.status = previousStatus;
    if (item) { item.status = previousStatus; renderList(); }
    $$('.status-seg-btn').forEach(b => {
      b.classList.toggle('is-active', b.getAttribute('data-status') === previousStatus);
    });
    showToast('Failed to update status: ' + err.message, 'error');
  }
}

function wireNoteEditor() {
  const ta = document.getElementById('note-textarea');
  if (!ta) return;
  ta.addEventListener('input', () => scheduleNoteSave());
  ta.addEventListener('blur', () => saveNoteNow());
}

function scheduleNoteSave() {
  const footer = document.getElementById('note-footer');
  const statusText = document.getElementById('note-status-text');
  if (footer) footer.classList.remove('is-saved', 'is-saving');
  if (statusText) statusText.textContent = 'Unsaved changes…';

  if (drawerState.noteDebounce) clearTimeout(drawerState.noteDebounce);
  drawerState.noteDebounce = setTimeout(() => saveNoteNow(), 1500);
}

async function saveNoteNow() {
  if (drawerState.noteDebounce) {
    clearTimeout(drawerState.noteDebounce);
    drawerState.noteDebounce = null;
  }
  if (!drawerState.submission) return;
  const ta = document.getElementById('note-textarea');
  if (!ta) return;
  const note = ta.value;
  if (note === (drawerState.submission.internalNote || '')) {
    // No actual change, don't hit the API
    const statusText = document.getElementById('note-status-text');
    if (statusText) statusText.textContent = 'Only visible to you — not sent to the visitor.';
    return;
  }

  const footer = document.getElementById('note-footer');
  const statusText = document.getElementById('note-status-text');
  if (footer) footer.classList.add('is-saving');
  if (statusText) statusText.textContent = 'Saving…';

  try {
    const res = await authedFetch('/api/enquiry/submissions?id=' + encodeURIComponent(drawerState.submission.id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ internalNote: note })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Save failed');
    }
    drawerState.submission.internalNote = note;
    drawerState.noteLastSavedAt = new Date();
    if (footer) { footer.classList.remove('is-saving'); footer.classList.add('is-saved'); }
    if (statusText) statusText.textContent = 'Saved. Only visible to you.';
    // Revert status text to default after a moment
    setTimeout(() => {
      if (statusText && drawerState.submission && drawerState.submission.internalNote === note) {
        if (footer) footer.classList.remove('is-saved');
        statusText.textContent = 'Only visible to you — not sent to the visitor.';
      }
    }, 3000);
  } catch (err) {
    console.error('[drawer] note save failed', err);
    if (footer) footer.classList.remove('is-saving');
    if (statusText) statusText.textContent = 'Save failed — try again';
    showToast('Failed to save note: ' + err.message, 'error');
  }
}

function wireCollapsibles() {
  $$('[data-collapse]').forEach(btn => {
    btn.addEventListener('click', () => {
      const wrap = btn.closest('.collapsible');
      if (wrap) wrap.classList.toggle('is-open');
    });
  });
}

function wireCopyButtons() {
  $$('[data-copy]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const value = btn.getAttribute('data-copy');
      if (!value) return;
      try {
        await navigator.clipboard.writeText(value);
        const labelSpan = btn.querySelector('svg')?.nextSibling;
        const originalText = btn.textContent.trim();
        btn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Copied
        `;
        setTimeout(() => {
          btn.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            ${originalText}
          `;
        }, 1800);
      } catch (e) {
        showToast('Copy failed', 'error');
      }
    });
  });
}

// Close drawer on Esc + click scrim
function bindDrawerDismiss() {
  $('#drawer-scrim').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && drawerState.open) closeDrawer();
  });
}

/* ============================ BINDINGS ============================ */
function bindSidebar() {
  // Status buttons
  $$('.sidebar-item[data-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.sidebar-item[data-status]').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      state.status = btn.getAttribute('data-status');
      state.cursor = '';
      fetchSubmissions(false);
    });
  });

  // Email status buttons — exclusive, like the main status group
  $$('.sidebar-item[data-email-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.sidebar-item[data-email-status]').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      state.emailStatus = btn.getAttribute('data-email-status') || '';
      state.cursor = '';
      fetchSubmissions(false);
    });
  });

  // Form filter
  $('#form-filter').addEventListener('change', e => {
    state.formId = e.target.value;
    state.cursor = '';
    fetchSubmissions(false);
  });

  // Date filters
  $('#date-from').addEventListener('change', e => {
    state.from = e.target.value;
    state.cursor = '';
    fetchSubmissions(false);
  });
  $('#date-to').addEventListener('change', e => {
    state.to = e.target.value;
    state.cursor = '';
    fetchSubmissions(false);
  });

  // Clear all
  $('#clear-filters').addEventListener('click', () => {
    state.formId = '';
    state.from = '';
    state.to = '';
    state.q = '';
    state.emailStatus = '';
    state.cursor = '';
    $('#form-filter').value = '';
    $('#date-from').value = '';
    $('#date-to').value = '';
    $('#search-input').value = '';
    $('#search-clear').classList.remove('is-visible');
    // Reset email status buttons to "Any"
    $$('.sidebar-item[data-email-status]').forEach(b => {
      b.classList.toggle('is-active', b.getAttribute('data-email-status') === '');
    });
    fetchSubmissions(false);
  });
}

function bindSearch() {
  const input = $('#search-input');
  const clear = $('#search-clear');
  let debounce;
  input.addEventListener('input', e => {
    const v = e.target.value;
    clear.classList.toggle('is-visible', !!v);
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      state.q = v.trim();
      state.cursor = '';
      fetchSubmissions(false);
    }, 300);
  });
  clear.addEventListener('click', () => {
    input.value = '';
    clear.classList.remove('is-visible');
    state.q = '';
    state.cursor = '';
    fetchSubmissions(false);
    input.focus();
  });
}

function bindRefresh() {
  $('#btn-refresh').addEventListener('click', () => {
    state.cursor = '';
    fetchSubmissions(false);
  });
}

/* ============================ BOOT ============================ */
(function boot() {
  if (!ensureSession()) return;
  bindSidebar();
  bindSearch();
  bindRefresh();
  bindDrawerDismiss();
  fetchSubmissions(false);
})();
</script>
