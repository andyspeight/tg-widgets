<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Submissions inbox · Travelgenix</title>
<meta name="robots" content="noindex,nofollow">
<style>
  /* ======================== TOKENS (shared with editor) ======================== */
  :root {
    --brand: #EC4899;
    --brand-soft: rgba(236, 72, 153, .12);
    --brand-ink: #BE185D;

    --success: #16A34A;
    --warning: #F59E0B;
    --danger: #DC2626;
    --info: #0EA5E9;

    --ink: #0F172A;
    --sub: #475569;
    --muted: #94A3B8;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --panel: #FFFFFF;
    --panel-2: #F8FAFC;
    --hover: #F1F5F9;

    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;

    --shadow-xs: 0 1px 2px rgba(15, 23, 42, .05);
    --shadow-sm: 0 1px 3px rgba(15, 23, 42, .08);
    --shadow-lg: 0 10px 30px rgba(15, 23, 42, .12);
    --shadow-xl: 0 24px 60px rgba(15, 23, 42, .18);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    background: var(--panel-2);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; font-size: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }
  a { color: inherit; }

  /* =========================== LAYOUT =========================== */
  .app {
    display: grid;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Topbar ── */
  .topbar {
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
  }
  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    text-decoration: none;
  }
  .topbar-brand-mark {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--brand);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .topbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }
  .topbar-sub {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }
  .topbar-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    color: var(--sub);
    text-decoration: none;
    border-radius: 6px;
    transition: all .1s ease;
  }
  .topbar-back:hover {
    background: var(--hover);
    color: var(--ink);
  }

  /* ── Main body = sidebar + list ── */
  .body {
    display: grid;
    grid-template-columns: 260px 1fr;
    overflow: hidden;
    min-height: 0;
  }
  @media (max-width: 800px) {
    .body { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    overflow-y: auto;
  }
  .sidebar-section {
    margin-bottom: 24px;
  }
  .sidebar-section:last-child { margin-bottom: 0; }
  .sidebar-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 0 0 8px 4px;
  }

  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    color: var(--sub);
    cursor: pointer;
    border: 0;
    background: none;
    width: 100%;
    text-align: left;
    transition: all .1s ease;
    margin-bottom: 2px;
  }
  .sidebar-item:hover {
    background: var(--hover);
    color: var(--ink);
  }
  .sidebar-item.is-active {
    background: var(--brand-soft);
    color: var(--brand-ink);
    font-weight: 600;
  }
  .sidebar-item-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-weight: 600;
    background: var(--hover);
    padding: 1px 7px;
    border-radius: 999px;
    min-width: 22px;
    text-align: center;
  }
  .sidebar-item.is-active .sidebar-item-count {
    background: rgba(236,72,153,.15);
    color: var(--brand-ink);
  }
  .sidebar-icon {
    flex-shrink: 0;
  }

  /* Form filter */
  .sidebar-select {
    width: 100%;
    padding: 8px 12px;
    font-size: 13px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--ink);
    cursor: pointer;
    outline: none;
    transition: border-color .12s ease;
  }
  .sidebar-select:hover { border-color: var(--border-strong); }
  .sidebar-select:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  .sidebar-date-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
  }
  .sidebar-date-input {
    flex: 1;
    padding: 7px 10px;
    font-size: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--ink);
    outline: none;
    transition: border-color .12s ease;
  }
  .sidebar-date-input:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }

  .sidebar-clear-btn {
    font-size: 12px;
    color: var(--muted);
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 8px;
  }
  .sidebar-clear-btn:hover { color: var(--ink); }

  /* ── Main list area ── */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
    background: var(--panel-2);
  }

  .list-head {
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 520px;
  }
  .search-input {
    width: 100%;
    padding: 9px 14px 9px 38px;
    font-size: 13px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 7px;
    outline: none;
    transition: all .12s ease;
  }
  .search-input:focus {
    border-color: var(--brand);
    background: var(--panel);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: 0;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: none;
  }
  .search-clear.is-visible { display: flex; }
  .search-clear:hover {
    background: var(--hover);
    color: var(--ink);
  }

  .list-stats {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .list-refresh {
    background: none;
    border: 1px solid var(--border);
    padding: 7px 10px;
    border-radius: 7px;
    color: var(--sub);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    transition: all .1s ease;
  }
  .list-refresh:hover {
    background: var(--hover);
    border-color: var(--border-strong);
    color: var(--ink);
  }
  .list-refresh.is-loading svg {
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
  }

  .list-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0 80px;
  }

  /* ── Row ── */
  .row {
    display: grid;
    grid-template-columns: 24px 140px 1fr 160px 110px 100px 120px;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s ease;
  }
  .row:hover {
    background: var(--hover);
  }
  .row.is-unread {
    background: #FFF7FB;
  }
  .row.is-unread:hover {
    background: #FFEAF4;
  }
  .row.is-selected {
    background: var(--brand-soft);
  }
  .row-unread-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--brand);
    opacity: 0;
  }
  .row.is-unread .row-unread-dot {
    opacity: 1;
  }
  .row-ref {
    font-family: -apple-system, "SF Mono", Menlo, monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row.is-unread .row-ref {
    color: var(--ink);
  }
  .row-main {
    min-width: 0;
  }
  .row-name {
    font-weight: 600;
    color: var(--ink);
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .row-email {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-destinations {
    font-size: 13px;
    color: var(--sub);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-form {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-travellers {
    font-size: 12px;
    color: var(--sub);
    white-space: nowrap;
  }
  .row-date {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    text-align: right;
  }

  @media (max-width: 900px) {
    .row {
      grid-template-columns: 20px 1fr auto;
    }
    .row-ref, .row-destinations, .row-form, .row-travellers { display: none; }
  }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
    white-space: nowrap;
  }
  .badge-new       { background: var(--brand-soft); color: var(--brand-ink); }
  .badge-read      { background: var(--hover); color: var(--sub); }
  .badge-archived  { background: #F1F5F9; color: var(--muted); }
  .badge-converted { background: rgba(22, 163, 74, .12); color: var(--success); }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon {
    width: 60px;
    height: 60px;
    border-radius: 16px;
    background: var(--hover);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .empty-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: 13px;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.6;
  }

  /* Loading state */
  .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  /* Load more footer */
  .load-more {
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .load-more-btn {
    padding: 9px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    color: var(--sub);
    cursor: pointer;
    transition: all .1s ease;
  }
  .load-more-btn:hover {
    background: var(--hover);
    border-color: var(--border-strong);
    color: var(--ink);
  }
  .load-more-btn:disabled {
    opacity: .6;
    cursor: not-allowed;
  }

  /* =========================== LOGIN OVERLAY =========================== */
  .login-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(4px);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-overlay.is-visible { display: flex; }
  .login-card {
    background: var(--panel);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
    padding: 32px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  .login-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--brand-soft);
    color: var(--brand);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }
  .login-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .login-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--brand);
    color: #fff;
    border: 0;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .login-btn:hover { background: #DB2777; }

  /* =========================== TOAST =========================== */
  .toast-wrap {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    padding: 12px 16px;
    border-radius: 9px;
    background: var(--ink);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow-lg);
    animation: toast-in .2s ease;
    max-width: 360px;
  }
  .toast.success { background: var(--success); }
  .toast.warning { background: var(--warning); }
  .toast.error { background: var(--danger); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Login overlay — shown if tgw_session is missing/expired -->
<div id="login-overlay" class="login-overlay">
  <div class="login-card">
    <div class="login-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="login-title">Sign in to view your inbox</div>
    <div class="login-sub">The submissions inbox needs a signed-in Travelgenix account to show only your leads.</div>
    <a class="login-btn" href="/">Go to sign in</a>
  </div>
</div>

<!-- App -->
<div class="app" id="app" style="display: none;">

  <!-- Topbar -->
  <div class="topbar">
    <a class="topbar-brand" href="/">
      <span class="topbar-brand-mark">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </span>
      <span>Travelgenix</span>
    </a>
    <div class="topbar-divider"></div>
    <div class="topbar-title">Submissions inbox</div>
    <div class="topbar-sub" id="topbar-sub"></div>
    <a class="topbar-back" href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Dashboard
    </a>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-section">
        <h3 class="sidebar-title">Status</h3>
        <button class="sidebar-item is-active" data-status="New,Read">
          <svg class="sidebar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span>Active</span>
          <span class="sidebar-item-count" id="count-active">—</span>
        </button>
        <button class="sidebar-item" data-status="New">
          <svg class="sidebar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>Unread</span>
          <span class="sidebar-item-count" id="count-new">—</span>
        </button>
        <button class="sidebar-item" data-status="Converted">
          <svg class="sidebar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Converted</span>
          <span class="sidebar-item-count" id="count-converted">—</span>
        </button>
        <button class="sidebar-item" data-status="Archived">
          <svg class="sidebar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          <span>Archived</span>
          <span class="sidebar-item-count" id="count-archived">—</span>
        </button>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">Form</h3>
        <select class="sidebar-select" id="form-filter">
          <option value="">All forms</option>
        </select>
      </div>

      <div class="sidebar-section">
        <h3 class="sidebar-title">Date range</h3>
        <div class="sidebar-date-row">
          <input type="date" class="sidebar-date-input" id="date-from" aria-label="From">
          <input type="date" class="sidebar-date-input" id="date-to" aria-label="To">
        </div>
        <button class="sidebar-clear-btn" id="clear-filters">Clear all filters</button>
      </div>

    </aside>

    <!-- List -->
    <main class="main">
      <div class="list-head">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="search-input" placeholder="Search by reference, name, email, destination…" spellcheck="false">
          <button class="search-clear" id="search-clear" type="button" aria-label="Clear search">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="list-stats" id="list-stats"></div>
        <button class="list-refresh" id="btn-refresh" aria-label="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
          </svg>
          <span>Refresh</span>
        </button>
      </div>

      <div class="list-scroll" id="list-scroll">
        <!-- Rows rendered here -->
      </div>
    </main>

  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
/* =========================== UTILITIES =========================== */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));

function showToast(msg, kind = 'info', ms = 3000) {
  const wrap = $('#toast-wrap');
  const t = document.createElement('div');
  t.className = 'toast' + (kind === 'success' || kind === 'warning' || kind === 'error' ? ' ' + kind : '');
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, ms);
}

// Format an ISO date/time for list-view "2h ago" / "Yesterday" / "3 Apr" style
function formatRelativeDate(iso) {
  if (!iso) return '';
  const date = new Date(iso);
  if (isNaN(date)) return '';
  const now = new Date();
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHour = Math.floor(diffMin / 60);
  const diffDay = Math.floor(diffHour / 24);
  if (diffMin < 1) return 'Just now';
  if (diffMin < 60) return diffMin + 'm ago';
  if (diffHour < 24) return diffHour + 'h ago';
  if (diffDay === 1) return 'Yesterday';
  if (diffDay < 7) return diffDay + 'd ago';
  // Older — show "3 Apr" style
  return date.toLocaleDateString(undefined, { day: 'numeric', month: 'short' });
}

function formatDepartDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// Destinations come as a JSON array of objects (or plain strings if legacy).
// Summarise into a single string for the list row.
function summariseDestinations(dests) {
  if (!dests) return '';
  if (!Array.isArray(dests)) return String(dests);
  if (dests.length === 0) return '';
  const names = dests.map(d => {
    if (typeof d === 'string') return d;
    return d.name || d.id || '';
  }).filter(Boolean);
  if (names.length === 0) return '';
  if (names.length === 1) return names[0];
  if (names.length === 2) return names[0] + ' + ' + names[1];
  return names[0] + ' + ' + (names.length - 1) + ' more';
}

function travellersText(adults, children) {
  const a = adults || 0;
  const c = children || 0;
  if (a + c === 0) return '—';
  const parts = [];
  if (a > 0) parts.push(a + ' adult' + (a === 1 ? '' : 's'));
  if (c > 0) parts.push(c + ' child' + (c === 1 ? '' : 'ren'));
  return parts.join(', ');
}

/* =========================== STATE =========================== */
const state = {
  session: null,
  status: 'New,Read',
  formId: '',
  q: '',
  from: '',
  to: '',
  cursor: '',
  items: [],
  counts: { active: 0, new: 0, converted: 0, archived: 0 },
  loading: false,
  forms: [],  // populated lazily from list results
};

/* =========================== AUTH =========================== */
function loadSession() {
  try {
    const raw = sessionStorage.getItem('tgw_session');
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

function ensureSession() {
  state.session = loadSession();
  if (!state.session || !state.session.token) {
    $('#login-overlay').classList.add('is-visible');
    return false;
  }
  $('#app').style.display = 'grid';
  $('#topbar-sub').textContent = state.session.email || '';
  return true;
}

function authedFetch(url, opts = {}) {
  const headers = opts.headers || {};
  if (state.session && state.session.token) {
    headers['Authorization'] = 'Bearer ' + state.session.token;
  }
  return fetch(url, Object.assign({}, opts, { headers }));
}

/* =========================== API =========================== */
async function fetchSubmissions(append = false) {
  state.loading = true;
  renderList();
  $('#btn-refresh').classList.add('is-loading');

  const params = new URLSearchParams({
    status: state.status,
    limit: '50',
  });
  if (state.formId) params.set('formId', state.formId);
  if (state.q) params.set('q', state.q);
  if (state.from) params.set('from', state.from);
  if (state.to) params.set('to', state.to);
  if (append && state.cursor) params.set('cursor', state.cursor);

  try {
    const res = await authedFetch('/api/enquiry/submissions?' + params.toString());
    if (res.status === 401) {
      $('#login-overlay').classList.add('is-visible');
      $('#app').style.display = 'none';
      return;
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Request failed');
    }
    const data = await res.json();

    if (append) {
      state.items = state.items.concat(data.submissions || []);
    } else {
      state.items = data.submissions || [];
    }
    state.cursor = data.nextCursor || '';

    // Update form filter dropdown from submissions seen so far
    updateFormFilterFromItems();

    // Update sidebar counts (rough — based on current page)
    // For proper counts we'd need a count endpoint; MVP shows "current view" totals
    updateStats();

  } catch (err) {
    console.error('[inbox] fetchSubmissions failed', err);
    showToast('Failed to load submissions: ' + err.message, 'error');
    state.items = [];
  } finally {
    state.loading = false;
    $('#btn-refresh').classList.remove('is-loading');
    renderList();
  }
}

/* =========================== RENDERING =========================== */
function renderList() {
  const scroll = $('#list-scroll');

  if (state.loading && state.items.length === 0) {
    scroll.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading submissions…</div>
      </div>
    `;
    return;
  }

  if (state.items.length === 0) {
    const hasFilter = state.q || state.formId || state.from || state.to;
    scroll.innerHTML = `
      <div class="empty">
        <span class="empty-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <div class="empty-title">${hasFilter ? 'Nothing matches those filters' : 'No submissions yet'}</div>
        <div class="empty-sub">${hasFilter
          ? 'Try clearing a filter or adjusting the date range.'
          : 'When visitors submit one of your enquiry forms, their details will land here for you to pick up.'}</div>
      </div>
    `;
    return;
  }

  // Render rows
  const rows = state.items.map(sub => renderRow(sub)).join('');
  const loadMore = state.cursor
    ? `<div class="load-more"><button class="load-more-btn" id="btn-load-more">Load more</button></div>`
    : '';
  scroll.innerHTML = rows + loadMore;

  // Wire row clicks
  $$('.row').forEach(r => {
    r.addEventListener('click', () => openSubmission(r.getAttribute('data-id')));
  });

  // Wire load-more
  const lm = $('#btn-load-more');
  if (lm) lm.addEventListener('click', () => fetchSubmissions(true));

  // Update stats
  const stats = $('#list-stats');
  stats.textContent = state.items.length + ' submission' + (state.items.length === 1 ? '' : 's');
  if (state.cursor) stats.textContent += ' (more available)';
}

function renderRow(sub) {
  const fullName = [sub.firstName, sub.lastName].filter(Boolean).join(' ') || '(no name)';
  const destText = summariseDestinations(sub.destinations);
  const travText = travellersText(sub.adults, sub.children);
  const dateText = formatRelativeDate(sub.submittedAt);
  const badgeClass = 'badge-' + sub.status.toLowerCase();
  const unread = sub.unread ? ' is-unread' : '';

  return `
    <div class="row${unread}" data-id="${escapeHtml(sub.id)}" role="button" tabindex="0">
      <span class="row-unread-dot" aria-hidden="true"></span>
      <div class="row-ref">${escapeHtml(sub.reference || '—')}</div>
      <div class="row-main">
        <div class="row-name">${escapeHtml(fullName)}</div>
        <div class="row-email">${escapeHtml(sub.email || '—')}</div>
      </div>
      <div class="row-destinations">${escapeHtml(destText) || '—'}</div>
      <div class="row-form">${escapeHtml(sub.formName || sub.formId || '—')}</div>
      <div class="row-travellers">${escapeHtml(travText)}</div>
      <div class="row-date">
        <span class="badge ${badgeClass}">${escapeHtml(sub.status)}</span>
        <div style="margin-top: 4px;">${escapeHtml(dateText)}</div>
      </div>
    </div>
  `;
}

function updateStats() {
  // Count items by status in the current result set
  const counts = { active: 0, new: 0, converted: 0, archived: 0 };
  state.items.forEach(s => {
    if (s.status === 'New' || s.status === 'Read') counts.active++;
    if (s.status === 'New') counts.new++;
    if (s.status === 'Converted') counts.converted++;
    if (s.status === 'Archived') counts.archived++;
  });
  // These are current-view counts, not true global counts.
  // MVP — if agents want "how many unread across everything", we'd add a count endpoint.
  $('#count-active').textContent = counts.active || '—';
  $('#count-new').textContent = counts.new || '—';
  $('#count-converted').textContent = counts.converted || '—';
  $('#count-archived').textContent = counts.archived || '—';
}

function updateFormFilterFromItems() {
  // Build set of (formId, formName) from the loaded items
  const formMap = new Map();
  state.items.forEach(s => {
    if (s.formId && !formMap.has(s.formId)) {
      formMap.set(s.formId, s.formName || s.formId);
    }
  });
  const forms = Array.from(formMap.entries()).map(([id, name]) => ({ id, name }));
  forms.sort((a, b) => a.name.localeCompare(b.name));

  // Keep existing selection if still present
  const current = state.formId;
  const sel = $('#form-filter');
  sel.innerHTML = '<option value="">All forms</option>' +
    forms.map(f => `<option value="${escapeHtml(f.id)}"${f.id === current ? ' selected' : ''}>${escapeHtml(f.name)}</option>`).join('');
  state.forms = forms;
}

/* ============================ DRAWER ============================ */
// Stub — detail drawer is built in Part B. For now, just toast.
function openSubmission(id) {
  // Mark visually as selected so agents get feedback
  $$('.row').forEach(r => r.classList.remove('is-selected'));
  const row = document.querySelector(`.row[data-id="${id}"]`);
  if (row) row.classList.add('is-selected');
  showToast('Detail view arrives in the next build', 'info', 2400);
}

/* ============================ BINDINGS ============================ */
function bindSidebar() {
  // Status buttons
  $$('.sidebar-item[data-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.sidebar-item[data-status]').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      state.status = btn.getAttribute('data-status');
      state.cursor = '';
      fetchSubmissions(false);
    });
  });

  // Form filter
  $('#form-filter').addEventListener('change', e => {
    state.formId = e.target.value;
    state.cursor = '';
    fetchSubmissions(false);
  });

  // Date filters
  $('#date-from').addEventListener('change', e => {
    state.from = e.target.value;
    state.cursor = '';
    fetchSubmissions(false);
  });
  $('#date-to').addEventListener('change', e => {
    state.to = e.target.value;
    state.cursor = '';
    fetchSubmissions(false);
  });

  // Clear all
  $('#clear-filters').addEventListener('click', () => {
    state.formId = '';
    state.from = '';
    state.to = '';
    state.q = '';
    state.cursor = '';
    $('#form-filter').value = '';
    $('#date-from').value = '';
    $('#date-to').value = '';
    $('#search-input').value = '';
    $('#search-clear').classList.remove('is-visible');
    fetchSubmissions(false);
  });
}

function bindSearch() {
  const input = $('#search-input');
  const clear = $('#search-clear');
  let debounce;
  input.addEventListener('input', e => {
    const v = e.target.value;
    clear.classList.toggle('is-visible', !!v);
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      state.q = v.trim();
      state.cursor = '';
      fetchSubmissions(false);
    }, 300);
  });
  clear.addEventListener('click', () => {
    input.value = '';
    clear.classList.remove('is-visible');
    state.q = '';
    state.cursor = '';
    fetchSubmissions(false);
    input.focus();
  });
}

function bindRefresh() {
  $('#btn-refresh').addEventListener('click', () => {
    state.cursor = '';
    fetchSubmissions(false);
  });
}

/* ============================ BOOT ============================ */
(function boot() {
  if (!ensureSession()) return;
  bindSidebar();
  bindSearch();
  bindRefresh();
  fetchSubmissions(false);
})();
</script>
