<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget Editor — Travelgenix</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#F4F5F7;--surface:#FFF;--border:#E3E5E8;--text:#1A1D23;--sub:#6B7280;--muted:#9CA3AF;--brand:#0891B2;--brand-lt:#ECFEFF;--brand-dk:#0E7490;--accent:#7C3AED;--danger:#EF4444;--success:#10B981;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06);--font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* Editor Panel */
.editor{width:360px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.ed-top{padding:14px 16px;border-bottom:1px solid var(--border)}
.ed-top-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ed-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--accent));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ed-logo svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ed-info{flex:1;min-width:0}
.ed-info h1{font-size:13px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ed-info span{font-size:11px;color:var(--muted);font-weight:500}
.ed-name-row{display:flex;gap:6px}
.ed-name-input{flex:1;padding:7px 10px;font-size:12px;border:1px solid var(--border);border-radius:8px;background:#FAFBFC;font-family:var(--font);color:var(--text);outline:none}
.ed-name-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.save-btn{padding:7px 14px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.save-btn:hover{background:var(--brand-dk)}
.save-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Action buttons row */
.ed-actions{display:flex;gap:4px;margin-left:auto}
.act-btn{height:34px;padding:0 10px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;font-family:var(--font);color:var(--sub);transition:all .15s}
.act-btn:hover{background:var(--bg);border-color:#ccc}
.act-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.act-btn.ai{color:var(--accent);border-color:#E9E5FF}
.act-btn.ai:hover{background:#F5F3FF}

/* Tabs */
.ed-tabs{display:flex;border-bottom:1px solid var(--border)}
.ed-tab{flex:1;padding:10px 0;font-size:12px;font-weight:600;text-align:center;border:none;background:none;cursor:pointer;color:var(--muted);position:relative;transition:color .2s;font-family:var(--font)}
.ed-tab.active{color:var(--brand)}
.ed-tab.active::after{content:'';position:absolute;bottom:0;left:12px;right:12px;height:2px;background:var(--brand);border-radius:1px}

.ed-body{flex:1;overflow-y:auto}

/* Sections */
.sec{border-bottom:1px solid var(--border)}
.sec-hd{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-hd:hover{background:#FAFAFA}
.sec-title{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.sec-title svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sec-chev{width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.sec.open .sec-chev{transform:rotate(180deg)}
.sec-bd{padding:0 16px 14px;display:none}
.sec.open .sec-bd{display:block}
.sec-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;background:var(--brand-lt);color:var(--brand);text-transform:uppercase;letter-spacing:.5px}

/* Fields */
.fld{margin-bottom:10px}
.fld-lbl{font-size:12px;font-weight:500;color:var(--sub);margin-bottom:4px;display:block}
input[type="text"],input[type="number"],input[type="url"],select,textarea{width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--border);border-radius:8px;background:#FAFBFC;font-family:var(--font);color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
textarea{resize:vertical;min-height:56px}

.color-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.color-row label{font-size:12px;font-weight:500;color:var(--sub)}
.color-right{display:flex;align-items:center;gap:8px}
.color-right span{font-size:10px;color:var(--muted);font-family:monospace;text-transform:uppercase}
.swatch{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);overflow:hidden;position:relative;cursor:pointer}
.swatch input{position:absolute;inset:-4px;width:140%;height:140%;opacity:0;cursor:pointer}
.presets{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.preset{height:32px;border-radius:8px;border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;transition:all .15s}
.preset:hover{border-color:var(--brand);transform:scale(1.08)}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-row label{font-size:12px;font-weight:500;color:var(--sub)}
.tgl{width:36px;height:20px;border-radius:10px;background:#D1D5DB;border:none;cursor:pointer;position:relative;transition:background .2s;padding:0}
.tgl.on{background:var(--brand)}
.tgl .dot{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.15);transition:transform .2s}
.tgl.on .dot{transform:translateX(16px)}

.slider-row{margin-bottom:10px}
.slider-top{display:flex;justify-content:space-between;margin-bottom:4px}
input[type="range"]{width:100%;height:6px;-webkit-appearance:none;background:var(--border);border-radius:3px;outline:none;border:none;padding:0}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--brand);border-radius:8px;cursor:pointer}

/* Font picker */
.font-picker{position:relative}
.font-search{width:100%;padding:7px 10px 7px 30px;font-size:12px;border:1px solid var(--border);border-radius:8px;background:#FAFBFC;font-family:var(--font);color:var(--text);outline:none}
.font-search:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.font-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
.font-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-top:4px;background:#fff;display:none}
.font-picker.open .font-list{display:block}
.font-opt{padding:8px 10px;font-size:13px;cursor:pointer;transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.font-opt:hover{background:var(--bg)}
.font-opt.active{background:var(--brand-lt);color:var(--brand);font-weight:600}
.font-preview{font-size:11px;color:var(--muted)}
.current-font{font-size:11px;color:var(--brand);font-weight:600;margin-top:4px}

/* Plan cards */
.plan-card{background:#FAFBFC;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
.pc-hd{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer}
.pc-hd:hover{background:#F3F4F6}
.pc-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pc-name{flex:1;font-size:12px;font-weight:600;color:var(--text)}
.pc-price{font-size:11px;color:var(--muted);font-family:monospace}
.pc-bd{padding:10px;border-top:1px solid var(--border);display:none}
.plan-card.open .pc-bd{display:block}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}

.feat-row{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.feat-tog{width:20px;height:20px;border-radius:4px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.feat-tog svg{width:10px;height:10px;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
.feat-row input{flex:1;padding:5px 8px;font-size:11px}
.feat-hint{width:80px;font-size:10px!important}
.feat-del{width:20px;height:20px;border:none;background:transparent;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;border-radius:4px;opacity:0;transition:opacity .15s}
.feat-row:hover .feat-del{opacity:1}
.feat-del:hover{color:var(--danger);background:#FEF2F2}
.feat-del svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.add-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--brand);background:none;border:none;cursor:pointer;padding:4px 0;font-family:var(--font)}
.add-btn:hover{color:var(--brand-dk)}
.add-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.del-btn{color:var(--danger)}
.del-btn:hover{color:#DC2626!important}

/* Upload zone */
.upload{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
.upload:hover,.upload.dragover{border-color:var(--brand);background:var(--brand-lt)}
.upload svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 4px;display:block}
.upload p{font-size:12px;color:var(--sub);font-weight:500}
.upload small{font-size:11px;color:var(--muted)}
.upload .dl{color:var(--brand);text-decoration:underline;cursor:pointer;font-weight:600}

/* Preview */
.preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.prev-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.prev-devs{display:flex;align-items:center;gap:4px}
.prev-devs span{font-size:12px;font-weight:500;color:var(--muted);margin-right:8px}
.dev-btn{width:30px;height:30px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .15s}
.dev-btn.active{background:var(--bg);color:var(--brand)}
.dev-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.prev-right{display:flex;align-items:center;gap:6px}
.theme-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:500;color:var(--sub);font-family:var(--font);transition:all .15s}
.theme-btn:hover{background:var(--bg)}
.theme-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.prev-frame{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:24px;background:#E8ECF0}
.prev-box{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:width .3s;min-height:500px}

/* Embed */
.embed{background:#1E293B;border-radius:10px;padding:14px;font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#CBD5E1;line-height:1.8;overflow-x:auto;margin-bottom:8px;white-space:pre-wrap;word-break:break-all}
.embed .t{color:#67E8F9}.embed .a{color:#6EE7B7}.embed .v{color:#FCD34D}
.copy-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--brand);font-family:var(--font);transition:all .15s}
.copy-btn:hover{background:var(--brand-lt)}
.copy-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-bg.open{opacity:1;pointer-events:auto}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(8px);transition:transform .2s}
.modal-bg.open .modal{transform:translateY(0)}
.modal-bd{padding:24px}
.modal h2{font-size:16px;font-weight:700;margin-bottom:4px}
.modal p{font-size:13px;color:var(--sub);margin-bottom:14px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:#FAFBFC;font-size:11px;color:var(--sub);cursor:pointer;font-family:var(--font);transition:all .15s}
.chip:hover{border-color:var(--brand);background:var(--brand-lt);color:var(--brand)}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);border:none;transition:all .15s}
.btn-c{background:var(--bg);color:var(--sub)}.btn-c:hover{background:#E5E7EB}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--brand));color:#fff}.btn-p:hover{box-shadow:0 4px 12px rgba(8,145,178,.3)}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.ai-hd{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ai-ico{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--brand));display:flex;align-items:center;justify-content:center}
.ai-ico svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tpl-card{padding:12px;border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .15s}
.tpl-card:hover{border-color:var(--brand);background:var(--brand-lt)}
.tpl-ico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tpl-ico svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tpl-info{flex:1}.tpl-info strong{font-size:13px;display:block}.tpl-info small{font-size:11px;color:var(--muted)}

.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;z-index:2000;transform:translateY(60px);opacity:0;transition:all .3s;font-family:var(--font)}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--success)}.toast.err{background:var(--danger)}
.err-msg{color:var(--danger);font-size:12px;margin-bottom:8px;padding:6px 10px;background:#FEF2F2;border-radius:8px}
</style>
</head>
<body>

<div class="app">
<div class="editor">
  <div class="ed-top">
    <div class="ed-top-row">
      <div class="ed-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="ed-info"><h1 id="widgetTypeLabel">Pricing Table</h1><span>Widget Editor</span></div>
      <div class="ed-actions">
        <button class="act-btn" onclick="showTemplates()" title="Templates"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>Templates</button>
        <button class="act-btn ai" onclick="showAI()" title="AI Builder"><svg viewBox="0 0 24 24"><path d="M12 2l1 4 4 1-4 1-1 4-1-4-4-1 4-1 1-4z"/><path d="M19 13l.5 2 2 .5-2 .5-.5 2-.5-2-2-.5 2-.5.5-2z"/></svg>AI Build</button>
      </div>
    </div>
    <div class="ed-name-row">
      <input type="text" class="ed-name-input" id="widgetName" placeholder="Widget name..." value="My Pricing Table">
      <button class="save-btn" onclick="saveWidget()"><svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Save</button>
    </div>
  </div>

  <div class="ed-tabs">
    <button class="ed-tab active" onclick="switchTab('design',this)">Design</button>
    <button class="ed-tab" onclick="switchTab('content',this)">Content</button>
    <button class="ed-tab" onclick="switchTab('settings',this)">Settings</button>
  </div>

  <div class="ed-body" id="edBody"></div>
</div>

<div class="preview-area">
  <div class="prev-bar">
    <div class="prev-devs">
      <span>Preview</span>
      <button class="dev-btn active" onclick="setDev('desktop',this)"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
      <button class="dev-btn" onclick="setDev('tablet',this)"><svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></button>
      <button class="dev-btn" onclick="setDev('mobile',this)"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></button>
    </div>
    <div class="prev-right">
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>Light</button>
    </div>
  </div>
  <div class="prev-frame"><div class="prev-box" id="prevBox" style="width:100%"><div id="mount"></div></div></div>
</div>
</div>

<div class="modal-bg" id="aiModal"><div class="modal"><div class="modal-bd">
  <div class="ai-hd"><div class="ai-ico"><svg viewBox="0 0 24 24"><path d="M12 2l1 4 4 1-4 1-1 4-1-4-4-1 4-1 1-4z"/><path d="M19 13l.5 2 2 .5-2 .5-.5 2-.5-2-2-.5 2-.5.5-2z"/></svg></div><div><h2>AI Widget Builder</h2><p style="margin:0">Describe what you need in plain English</p></div></div>
  <textarea id="aiPrompt" style="width:100%;height:80px;margin-bottom:10px" placeholder="e.g. 3-tier pricing for a UK travel agency with prices in GBP"></textarea>
  <div class="chips">
    <button class="chip" onclick="document.getElementById('aiPrompt').value=this.textContent">3-tier pricing for a UK travel agency</button>
    <button class="chip" onclick="document.getElementById('aiPrompt').value=this.textContent">SaaS pricing with free tier in USD</button>
    <button class="chip" onclick="document.getElementById('aiPrompt').value=this.textContent">Luxury Mediterranean tour packages</button>
    <button class="chip" onclick="document.getElementById('aiPrompt').value=this.textContent">Gym membership with annual discount</button>
  </div>
  <div id="aiErr" class="err-msg" style="display:none"></div>
  <div class="modal-btns"><button class="btn-c" onclick="closeModals()">Cancel</button><button class="btn-p" id="aiBtn" onclick="genAI()"><svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;margin-right:4px;stroke-linecap:round;stroke-linejoin:round"><path d="M12 2l1 4 4 1-4 1-1 4-1-4-4-1 4-1 1-4z"/></svg>Generate with AI</button></div>
</div></div></div>

<div class="modal-bg" id="tplModal"><div class="modal"><div class="modal-bd">
  <h2>Start Building</h2><p>Choose a template or let AI create one</p>
  <div class="tpl-card" onclick="closeModals();showAI()" style="border-style:dashed;border-color:#C4B5FD;background:#FAF5FF">

</div></div></div>

<script>
/* ═══ STATE ═══ */

const TEMPLATES=[

  {name:'SaaS Product',desc:'Free / Pro / Enterprise · 3 plans',hd:{title:'Simple, Transparent Pricing',subtitle:'No hidden fees. Cancel anytime.'},plans:[
    {name:'Free',description:'For individuals',monthlyPrice:0,yearlyPrice:0,currency:'$',icon:'Zap',highlighted:false,badge:'',cta:'Sign Up Free',ctaUrl:'#',features:[{text:'3 projects',included:true,hint:''},{text:'1GB storage',included:true,hint:''},{text:'Community support',included:true,hint:''},{text:'API access',included:false,hint:''}]},
    {name:'Pro',description:'For growing teams',monthlyPrice:29,yearlyPrice:290,currency:'$',icon:'Star',highlighted:true,badge:'Best Value',cta:'Start Trial',ctaUrl:'#',features:[{text:'Unlimited projects',included:true,hint:''},{text:'50GB storage',included:true,hint:''},{text:'Priority support',included:true,hint:''},{text:'API access',included:true,hint:''}]},
    {name:'Enterprise',description:'For organisations',monthlyPrice:99,yearlyPrice:990,currency:'$',icon:'Crown',highlighted:false,badge:'',cta:'Contact Us',ctaUrl:'#',features:[{text:'Unlimited everything',included:true,hint:''},{text:'1TB storage',included:true,hint:''},{text:'Dedicated support',included:true,hint:''},{text:'Full API access',included:true,hint:''}]}]}
];

let C={header:{title:'Choose Your Plan',subtitle:'Start free, upgrade when you\'re ready. No hidden fees.'},brandColor:'#0891B2',accentColor:'#6366F1',pageBg:'#F8FAFC',cardBg:'#FFFFFF',textColor:'#0F172A',subtextColor:'#64748B',borderRadius:16,showToggle:true,showBadge:true,showIcons:true,showDescription:true,showHints:true,showTrustStrip:true,trustText:'30-day money-back guarantee · No contracts · Cancel anytime',savingsLabel:'Save {pct}%',theme:'light',fontFamily:'DM Sans',plans:[]};

/* ═══ INIT ═══ */
window.addEventListener('DOMContentLoaded',()=>{

async function loadW(id){

}

/* ═══ TABS ═══ */
function switchTab(t,btn){tab=t;document.querySelectorAll('.ed-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}

/* ═══ RENDER ═══ */
function render(){
  const B=document.getElementById('edBody');
  if(tab==='design')B.innerHTML=designTab();
  else if(tab==='content')B.innerHTML=contentTab();
  else B.innerHTML=settingsTab();
  bind();
}

function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML.replace(/"/g,'&quot;')}

function sec(t,ico,open,body,badge){
  return `<div class="sec${open?' open':''}"><div class="sec-hd" onclick="this.parentElement.classList.toggle('open')"><span class="sec-title"><svg viewBox="0 0 24 24">${ico}</svg>${t}${badge?`<span class="sec-badge">${badge}</span>`:''}</span><svg class="sec-chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="sec-bd">${body}</div></div>`;
}
function colF(lbl,key,val){return `<div class="color-row"><label>${lbl}</label><div class="color-right"><span>${val}</span><div class="swatch"><div style="width:100%;height:100%;background:${val}"></div><input type="color" value="${val}" data-bind="${key}"></div></div></div>`}
function togF(lbl,key,on){return `<div class="toggle-row"><label>${lbl}</label><button class="tgl${on?' on':''}" onclick="C.${key}=!C.${key};render();renderPrev()"><span class="dot"></span></button></div>`}

/* ═══ DESIGN TAB ═══ */
function designTab(){
  return sec('Header','<path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/>',true,`

  `);
}

/* ═══ CONTENT TAB ═══ */
function contentTab(){
  let h=`<div style="padding:12px 16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <span class="fld-lbl" style="font-weight:700;color:var(--text)">Plans (${C.plans.length})</span>
    <div style="display:flex;gap:8px">
      <button class="add-btn" onclick="showAI()"><svg viewBox="0 0 24 24"><path d="M12 2l1 4 4 1-4 1-1 4-1-4-4-1 4-1 1-4z"/></svg>AI</button>
      <button class="add-btn" onclick="addPlan()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add</button>
    </div></div>
    <div class="upload" id="uploadZone" onclick="document.getElementById('fileIn').click()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <p>Upload spreadsheet to import plans</p>
      <small>CSV or Excel — <span class="dl" onclick="event.stopPropagation();dlTemplate()">Download template</span></small>
      <input type="file" id="fileIn" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFile(this)">
    </div>`;

  C.plans.forEach((p,i)=>{
    const feats=p.features.map((f,fi)=>
      `<div class="feat-row"><button class="feat-tog" style="background:${f.included?'#ECFEFF':'#F3F4F6'}" onclick="C.plans[${i}].features[${fi}].included=!C.plans[${i}].features[${fi}].included;render();renderPrev()"><svg viewBox="0 0 24 24" style="stroke:${f.included?'var(--brand)':'#D1D5DB'}">${f.included?'<polyline points="20 6 9 17 4 12"/>':'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>'}</svg></button><input type="text" value="${esc(f.text)}" onchange="C.plans[${i}].features[${fi}].text=this.value;renderPrev()"><input type="text" class="feat-hint" value="${esc(f.hint||'')}" placeholder="Hint" onchange="C.plans[${i}].features[${fi}].hint=this.value;renderPrev()"><button class="feat-del" onclick="C.plans[${i}].features.splice(${fi},1);render();renderPrev()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></div>`
    ).join('');
    h+=`<div class="plan-card" id="p${i}"><div class="pc-hd" onclick="document.getElementById('p${i}').classList.toggle('open')"><div class="pc-dot" style="background:${p.highlighted?C.brandColor:'#E5E7EB'}"></div><span class="pc-name">${esc(p.name)||'Untitled'}</span><span class="pc-price">${esc(p.currency||'£')}${p.monthlyPrice}</span><svg class="sec-chev" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="pc-bd">
      <div class="pg"><div class="fld"><label class="fld-lbl">Name</label><input type="text" value="${esc(p.name)}" onchange="C.plans[${i}].name=this.value;render();renderPrev()"></div><div class="fld"><label class="fld-lbl">Icon</label><select onchange="C.plans[${i}].icon=this.value;renderPrev()">${['Zap','Star','Crown','Shield','Sparkles','Award'].map(ic=>`<option${p.icon===ic?' selected':''}>${ic}</option>`).join('')}</select></div></div>
      <div class="fld"><label class="fld-lbl">Description</label><input type="text" value="${esc(p.description)}" onchange="C.plans[${i}].description=this.value;renderPrev()"></div>
      <div class="pg"><div class="fld"><label class="fld-lbl">Monthly Price</label><input type="number" value="${p.monthlyPrice}" onchange="C.plans[${i}].monthlyPrice=+this.value;render();renderPrev()"></div><div class="fld"><label class="fld-lbl">Yearly Price</label><input type="number" value="${p.yearlyPrice}" onchange="C.plans[${i}].yearlyPrice=+this.value;renderPrev()"></div></div>
      <div class="pg"><div class="fld"><label class="fld-lbl">Currency</label><select onchange="C.plans[${i}].currency=this.value;render();renderPrev()">${['£','$','€','A$','C$'].map(c=>`<option${(p.currency||'£')===c?' selected':''}>${c}</option>`).join('')}</select></div><div class="fld"><label class="fld-lbl">CTA Text</label><input type="text" value="${esc(p.cta)}" onchange="C.plans[${i}].cta=this.value;renderPrev()"></div></div>
      <div class="fld"><label class="fld-lbl">CTA URL</label><input type="url" value="${esc(p.ctaUrl||'')}" onchange="C.plans[${i}].ctaUrl=this.value" placeholder="https://"></div>
      ${togF('Featured','plans['+i+'].highlighted',p.highlighted)}
      ${p.highlighted?`<div class="fld"><label class="fld-lbl">Badge Text</label><input type="text" value="${esc(p.badge)}" onchange="C.plans[${i}].badge=this.value;renderPrev()"></div>`:''}
      <div style="margin-top:8px"><label class="fld-lbl">Features</label><div style="margin-top:6px">${feats}</div>
      <button class="add-btn" onclick="C.plans[${i}].features.push({text:'New feature',included:true,hint:''});render();renderPrev()"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add feature</button></div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)"><button class="add-btn del-btn" onclick="C.plans.splice(${i},1);render();renderPrev()"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>Remove plan</button></div>
    </div></div>`;
  });
  if(!C.plans.length)h+=`<div style="text-align:center;padding:32px 0"><p style="font-size:12px;color:var(--muted)">No plans — add one or upload a spreadsheet</p></div>`;
  return h+'</div>';
}

/* ═══ SETTINGS TAB ═══ */
function settingsTab(){
  const wid=wId||'YOUR_WIDGET_ID';
  return sec('Display','<circle cx="12" cy="12" r="3"/><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>',true,`
    ${togF('Billing toggle','showToggle',C.showToggle)}
    ${togF('Feature badges','showBadge',C.showBadge)}
    ${togF('Plan icons','showIcons',C.showIcons)}
    ${togF('Descriptions','showDescription',C.showDescription)}
    ${togF('Feature tooltips','showHints',C.showHints)}
    ${togF('Trust strip','showTrustStrip',C.showTrustStrip)}
    ${C.showTrustStrip?`<div class="fld" style="margin-top:6px"><label class="fld-lbl">Trust text</label><input type="text" value="${esc(C.trustText)}" data-bind="trustText"></div>`:''}
  `)+sec('Embed Code','<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',true,`
    <div class="embed"><span class="t">&lt;div</span> <span class="a">data-tg-widget</span>=<span class="v">"pricing"</span>
     <span class="a">data-tg-id</span>=<span class="v">"${wid}"</span><span class="t">&gt;&lt;/div&gt;</span>
<span class="t">&lt;script</span> <span class="a">src</span>=<span class="v">"https://tg-widgets.vercel.app/widget.js"</span><span class="t">&gt;&lt;/script&gt;</span></div>
    <button class="copy-btn" onclick="copyEmbed()"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy embed code</button>
    ${wId?`<div style="margin-top:8px;font-size:11px;color:var(--muted)">Widget ID: <code style="background:#F1F5F9;padding:2px 6px;border-radius:4px">${wId}</code></div>`:'<div style="margin-top:8px;font-size:11px;color:var(--muted)">Save to get your widget ID</div>'}
  `)+sec('Custom CSS','<path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/>',false,`
    <div class="fld"><label class="fld-lbl">Custom CSS (advanced)</label><textarea placeholder=".tgp-card { border-width: 2px; }" data-bind="customCSS" style="font-family:monospace;font-size:11px;min-height:80px">${esc(C.customCSS||'')}</textarea></div>
  `,'Pro');
}

/* ═══ BIND ═══ */
function bind(){
  document.querySelectorAll('[data-bind]').forEach(el=>{
    el.addEventListener(el.type==='range'?'input':'change',()=>{
      const k=el.dataset.bind;
      if(k.includes('.')){const[a,b]=k.split('.');C[a][b]=el.value}else{C[k]=el.type==='range'?+el.value:el.value}
      render();renderPrev();
    });
  });
  // Upload drag
  const z=document.getElementById('uploadZone');
  if(z){z.ondragover=e=>{e.preventDefault();z.classList.add('dragover')};z.ondragleave=()=>z.classList.remove('dragover');z.ondrop=e=>{e.preventDefault();z.classList.remove('dragover');if(e.dataTransfer.files.length)procFile(e.dataTransfer.files[0])}}
  // Font picker
  renderFontList('');
  document.addEventListener('click',e=>{const fp=document.getElementById('fontPicker');if(fp&&!fp.contains(e.target))fp.classList.remove('open')});
}

/* ═══ FONTS ═══ */
function renderFontList(q){
  const list=document.getElementById('fontList');if(!list)return;
  const filtered=q?FONTS.filter(f=>f.toLowerCase().includes(q.toLowerCase())):FONTS;
  list.innerHTML=filtered.map(f=>`<div class="font-opt${C.fontFamily===f?' active':''}" onclick="pickFont('${f}')" style="font-family:'${f}',sans-serif">${f}</div>`).join('');
  // Load all fonts
  const link=document.getElementById('gfontLink');
  const families=FONTS.map(f=>f.replace(/ /g,'+')).join('&family=');
  if(!link){const l=document.createElement('link');l.id='gfontLink';l.rel='stylesheet';l.href='https://fonts.googleapis.com/css2?family='+families+'&display=swap';document.head.appendChild(l)}
}
function filterFonts(q){renderFontList(q)}
function pickFont(f){C.fontFamily=f;document.getElementById('fontPicker').classList.remove('open');document.getElementById('fontSearch').value='';render();renderPrev()}

/* ═══ PREVIEW ═══ */
function renderPrev(){
  const m=document.getElementById('mount');
  const cfg={...C,theme:dark?'dark':'light'};
  m.innerHTML='';
  const el=document.createElement('div');
  el.setAttribute('data-tg-widget','pricing');
  m.appendChild(el);
  if(window.TGPricingWidget)new window.TGPricingWidget(el,cfg);
}

function setDev(d,btn){document.querySelectorAll('.dev-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('prevBox').style.width=d==='mobile'?'375px':d==='tablet'?'768px':'100%'}

function toggleTheme(){
  dark=!dark;
  document.getElementById('themeBtn').innerHTML=dark
    ?'<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>Dark'
    :'<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>Light';
  renderPrev();
}

/* ═══ PLANS ═══ */
function addPlan(){C.plans.push({name:'New Plan',description:'Describe this plan',monthlyPrice:49,yearlyPrice:490,currency:C.plans[0]?.currency||'£',icon:'Zap',highlighted:false,badge:'',cta:'Get Started',ctaUrl:'#',features:[{text:'Feature one',included:true,hint:''}]});render();renderPrev()}

/* ═══ SPREADSHEET ═══ */
function handleFile(inp){if(inp.files.length)procFile(inp.files[0]);inp.value=''}
function procFile(file){
  const r=new FileReader();
  r.onload=function(e){try{
    const wb=XLSX.read(e.target.result,{type:'binary'}),ws=wb.Sheets[wb.SheetNames[0]],rows=XLSX.utils.sheet_to_json(ws);
    if(!rows.length){toast('No data found','err');return}
    C.plans=rows.map(row=>{
      const feats=[];
      Object.keys(row).filter(k=>k.toLowerCase().startsWith('feature')).forEach(col=>{let v=String(row[col]||'').trim();if(!v)return;let inc=true,hint='';if(v.startsWith('-')||v.startsWith('~')){inc=false;v=v.slice(1).trim()}else if(v.startsWith('+')){v=v.slice(1).trim()}if(v.includes('|')){const p=v.split('|');v=p[0].trim();hint=p[1].trim()}feats.push({text:v,included:inc,hint})});
      if(row.Features&&!feats.length)String(row.Features).split(/[;\n]/).forEach(line=>{let v=line.trim();if(!v)return;let inc=true,hint='';if(v.startsWith('-')){inc=false;v=v.slice(1).trim()}else if(v.startsWith('+')){v=v.slice(1).trim()}if(v.includes('|')){const p=v.split('|');v=p[0].trim();hint=p[1].trim()}feats.push({text:v,included:inc,hint})});
      return{name:row['Plan Name']||row.Name||row.Plan||'Untitled',description:row.Description||'',monthlyPrice:parseInt(row['Monthly Price']||row.Monthly||0),yearlyPrice:parseInt(row['Yearly Price']||row.Yearly||0),currency:row.Currency||'£',icon:row.Icon||'Zap',highlighted:String(row.Featured||'').toLowerCase()==='yes',badge:row.Badge||(String(row.Featured||'').toLowerCase()==='yes'?'Most Popular':''),cta:row.CTA||row['CTA Text']||row.Button||'Get Started',ctaUrl:row['CTA URL']||row.URL||'#',features:feats.length?feats:[{text:'Feature one',included:true,hint:''}]}
    });
    render();renderPrev();toast(`Imported ${C.plans.length} plans`,'ok');
  }catch(e){toast('Error reading file','err')}};
  r.readAsBinaryString(file);
}
function dlTemplate(){
  const h=['Plan Name','Description','Monthly Price','Yearly Price','Currency','CTA','CTA URL','Featured','Badge','Icon','Feature 1','Feature 2','Feature 3','Feature 4','Feature 5','Feature 6'];
  const ex=[['Starter','Basic package',29,290,'£','Get Started','#','no','','Zap','Bookable website','5 suppliers','Email support','-AI chatbot','-Custom branding',''],['Pro','Everything to grow',59,590,'£','Start Trial','#','yes','Most Popular','Star','+Bookable website','+25 suppliers|Includes niche ops','+Priority support|4hr response','+AI chatbot','-Custom branding',''],['Enterprise','Full power',99,990,'£','Contact Sales','#','no','','Crown','+Bookable website','+Unlimited suppliers','+Dedicated manager','+AI chatbot','+Custom branding|White-label','']];
  const ws=XLSX.utils.aoa_to_sheet([h,...ex]),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Plans');XLSX.writeFile(wb,'pricing-widget-template.xlsx');
}

/* ═══ AI ═══ */
function showAI(){closeModals();document.getElementById('aiModal').classList.add('open');document.getElementById('aiPrompt').focus()}
async function genAI(){
  const prompt=document.getElementById('aiPrompt').value.trim();if(!prompt)return;
  const btn=document.getElementById('aiBtn'),err=document.getElementById('aiErr');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Generating...';err.style.display='none';
  try{const r=await fetch('/api/widget-ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});if(!r.ok)throw 0;const d=await r.json();if(d.plans)C.plans=d.plans;if(d.header)C.header=d.header;if(d.brandColor)C.brandColor=d.brandColor;if(d.accentColor)C.accentColor=d.accentColor;if(d.trustText)C.trustText=d.trustText;closeModals();render();renderPrev();toast('AI generated your widget','ok')}
  catch(e){err.textContent='Generation failed — try a more specific description';err.style.display='block'}
  btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2;margin-right:4px;stroke-linecap:round;stroke-linejoin:round"><path d="M12 2l1 4 4 1-4 1-1 4-1-4-4-1 4-1 1-4z"/></svg>Generate with AI';
}

/* ═══ TEMPLATES ═══ */
function showTemplates(){
  document.getElementById('tplList').innerHTML=TEMPLATES.map((t,i)=>
    `<div class="tpl-card" onclick="applyTpl(${i})"><div class="tpl-ico" style="background:var(--bg)"><svg viewBox="0 0 24 24" style="stroke:var(--muted)"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></div><div class="tpl-info"><strong>${t.name}</strong><small>${t.desc}</small></div></div>`
  ).join('');
  document.getElementById('tplModal').classList.add('open');
}
function applyTpl(i){C.plans=JSON.parse(JSON.stringify(TEMPLATES[i].plans));C.header={...TEMPLATES[i].hd};closeModals();render();renderPrev();toast('Template applied','ok')}

/* ═══ SAVE ═══ */
async function saveWidget(){
  try{
    const name=document.getElementById('widgetName').value||'Untitled';
    const body={config:C,name};if(wId)body.widgetId=wId;
    const r=await fetch('/api/widget-config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();
    if(d.widgetId){wId=d.widgetId;const u=new URL(location);u.searchParams.set('id',wId);history.replaceState(null,'',u)}
    render();toast('Widget saved!','ok');
  }catch(e){toast('Save failed','err')}
}

/* ═══ UTILS ═══ */
function closeModals(){document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'))}
function copyEmbed(){const c=`<div data-tg-widget="pricing" data-tg-id="${wId||'YOUR_WIDGET_ID'}"></div>\n<script src="https://tg-widgets.vercel.app/widget.js"><\/script>`;navigator.clipboard.writeText(c).then(()=>toast('Copied!','ok'))}
function toast(m,t){const e=document.getElementById('toast');e.textContent=m;e.className='toast '+t+' show';setTimeout(()=>e.classList.remove('show'),3000)}
document.querySelectorAll('.modal-bg').forEach(m=>m.onclick=e=>{if(e.target===m)closeModals()});
</script>
