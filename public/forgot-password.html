<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot password · Travelgenix</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/editor-shell.css">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<main class="auth-shell" role="main">
  <div class="auth-brand">Travelgenix</div>
  <div class="auth-card">
    <h1>Forgot your password?</h1>
    <p class="lede">Enter your email and we'll send you a link to choose a new one.</p>

    <div id="msg" class="auth-msg" role="status" aria-live="polite"></div>

    <form id="forgotForm" class="auth-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="username" required>
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Send reset link</button>
    </form>

    <p class="magic-toggle" style="margin-top:18px;">
      <a href="/signin" class="link-btn">Back to sign in</a>
    </p>
  </div>
  <p class="auth-foot">Travelgenix · Bournemouth, UK · part of Agendas Group</p>
</main>

<script>
(function () {
  'use strict';
  const form = document.getElementById('forgotForm');
  const emailEl = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const msg = document.getElementById('msg');

  // Pre-fill from query
  const q = new URLSearchParams(location.search);
  if (q.get('email')) emailEl.value = q.get('email');

  function showMsg(text, kind) { msg.textContent = text; msg.className = 'auth-msg ' + (kind || 'info'); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = emailEl.value.trim().toLowerCase();
    if (!email) { showMsg('Please enter your email.', 'error'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending…';
    try {
      const res = await fetch('/api/auth/password/forgot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      // Always 200 unless rate limited
      if (res.status === 429) {
        showMsg('You have requested too many resets. Please wait an hour and try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send reset link';
        return;
      }
      // Generic success message — don't confirm whether email exists
      showMsg("If an account exists for that email, we've sent a reset link. Check your inbox.", 'info');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Email sent';
    } catch {
      showMsg('Network error. Please try again.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send reset link';
    }
  });
})();
</script>
</body>
</html>
